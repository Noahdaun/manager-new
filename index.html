<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="학원관리">
<meta name="theme-color" content="#E8500A">
<link rel="manifest" href="manifest.json">
<title>학원 학생관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --bg:#F0EDE8;--surface:#FFF;--border:#DDD9D2;--border2:#C8C4BC;
  --text:#1C1A17;--text2:#5C5750;--text3:#9C9890;
  --accent:#E8500A;--accent-light:#FDF0EA;--accent-dark:#C43E05;
  --blue:#1A6EBF;--blue-bg:#EAF3FC;--blue-dark:#0C4A8A;
  --green:#1A8A4A;--green-bg:#E8F7EE;
  --amber:#B86A00;--amber-bg:#FFF4E0;
  --red:#CC2222;--red-bg:#FDEAEA;
  --r:14px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;min-height:-webkit-fill-available}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:400px}
.auth-logo{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;margin-bottom:4px}
.auth-title{font-size:22px;font-weight:700;margin-bottom:24px}
.auth-tabs{display:flex;border:2px solid var(--border);border-radius:var(--r-sm);padding:3px;margin-bottom:18px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;border-radius:6px;color:var(--text2)}
.auth-tab.on{background:var(--text);color:#fff}
.role-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.role-btn{padding:14px;border:2px solid var(--border);border-radius:var(--r);text-align:center;cursor:pointer}
.role-btn.on{border-color:var(--accent);background:var(--accent-light)}
.role-btn-icon{font-size:22px;margin-bottom:4px}
.role-btn-label{font-size:13px;font-weight:700}
.role-btn-sub{font-size:11px;color:var(--text2);margin-top:2px}
.err{background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:12px;display:none;border:1px solid #F7C1C1}
.err.on{display:block}
.acad-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-sm);z-index:50;max-height:180px;overflow-y:auto;display:none}
.acad-dropdown.on{display:block}
.acad-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border)}
.acad-item:last-child{border-bottom:none}
.acad-item:hover{background:var(--bg)}

/* ── FORM ── */
.fg{margin-bottom:12px}
.fl{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}
input,textarea,select{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:var(--r-sm);font-size:15px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:72px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:var(--r-sm);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:2px solid var(--border);background:transparent;color:var(--text);transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-full{width:100%}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-danger{color:var(--red);border-color:var(--red-bg)}
.divider{height:2px;background:var(--border);margin:14px 0}

/* ── APP SHELL ── */
.screen{display:none;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available}
.screen.on{display:flex}
.app-header{background:var(--surface);border-bottom:2px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:8px}
.back-btn{display:none;align-items:center;gap:4px;font-size:14px;font-weight:700;color:var(--accent);cursor:pointer;padding:4px 0;white-space:nowrap}
.back-btn.on{display:flex}
.header-title{font-size:16px;font-weight:700}
.header-sub{font-size:11px;color:var(--text2)}

/* ── BOTTOM NAV ── */
.bottom-nav{background:var(--surface);border-top:2px solid var(--border);display:flex;flex-shrink:0;position:fixed;bottom:0;left:0;right:0;z-index:80;max-width:480px;margin:0 auto}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;color:var(--text2);position:relative;font-size:11px;font-weight:700;gap:3px}
.nav-item.on{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
.nav-badge{position:absolute;top:6px;right:calc(50% - 16px);background:var(--accent);color:#fff;border-radius:20px;font-size:10px;font-weight:700;min-width:16px;height:16px;padding:0 4px;display:none;align-items:center;justify-content:center}
.nav-badge.on{display:flex}

.content{flex:1;overflow-y:auto;padding-bottom:80px}

/* ── STUDENT LIST ── */
.page{display:none;padding:16px}
.page.on{display:block}
.s-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.s-card:active{border-color:var(--accent)}
.s-row{display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:2px solid transparent}
.av0{background:#FDF0EA;color:#C43E05;border-color:#F5C4B3}
.av1{background:#EAF3FC;color:#0C4A8A;border-color:#B5D4F4}
.av2{background:#E8F7EE;color:#14632F;border-color:#9FE1CB}
.av3{background:#F3EFFE;color:#6B21A8;border-color:#C4B5FD}
.av4{background:#FFF4E0;color:#854D0E;border-color:#FED7AA}
.s-name{font-size:15px;font-weight:700}
.s-meta{font-size:12px;color:var(--text2);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-blue{background:var(--blue-bg);color:var(--blue-dark)}
.b-orange{background:var(--accent-light);color:var(--accent-dark)}
.b-gray{background:#F0EDE8;color:var(--text2)}
.b-purple{background:#F3EFFE;color:#6B21A8}
.reenroll-tag{font-size:11px;padding:2px 6px;border-radius:10px;background:var(--amber-bg);color:var(--amber);font-weight:700}
.class-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;padding:10px 4px 4px;margin-top:2px}

/* ── STUDENT DETAIL ── */
.card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--bg);border-radius:var(--r-sm);padding:10px 8px;text-align:center;border:2px solid var(--border)}
.stat-v{font-size:20px;font-weight:700}
.stat-l{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500}
.info-tbl{width:100%;font-size:13px;border-collapse:collapse}
.info-tbl td{padding:6px 0;vertical-align:top;border-bottom:1px solid var(--border)}
.info-tbl tr:last-child td{border-bottom:none}
.info-tbl td:first-child{color:var(--text2);width:75px;font-weight:700}
.info-tbl td:last-child{font-weight:500}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:15px;font-weight:700}

/* ── CALENDAR ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.month-nav span{font-size:14px;font-weight:700}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-hdr span{text-align:center;font-size:10px;font-weight:700;color:var(--text2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--text2)}
.cal-day.clickable{cursor:pointer}
.cal-day.att{background:var(--blue-bg);color:var(--blue-dark);border-color:var(--blue)}
.cal-day.abs{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.cal-day.today{outline:2.5px solid var(--text);outline-offset:-1px}
.cal-day.emp{pointer-events:none;opacity:0;border:none;background:none}
.att-sum{font-size:13px;color:var(--text2);margin-top:8px;font-weight:500}
.att-sum b{color:var(--text);font-weight:700}

/* ── PROGRESS ── */
.prog-row{margin-bottom:12px}
.prog-lrow{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-lbl{font-size:14px;font-weight:700}
.prog-val{font-size:14px;font-weight:700}
.prog-bar{height:10px;background:var(--bg);border-radius:20px;overflow:hidden;margin-bottom:5px;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:20px;transition:width .3s}
input[type=range]{width:100%;accent-color:var(--text)}

/* ── FEEDBACK / HW / QUESTIONS ── */
.item-row{padding:11px 0;border-bottom:2px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.item-date{font-size:11px;color:var(--text3);font-weight:500}
.item-text{font-size:13px;line-height:1.6}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.chip{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid var(--border);cursor:pointer;color:var(--text2)}
.chip.on{background:var(--text);color:#fff;border-color:var(--text)}
.chip-dash{border-style:dashed}
.hw-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:2px solid var(--border)}
.hw-row:last-child{border-bottom:none}
.hw-check{width:22px;height:22px;border-radius:6px;border:2.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px}
.hw-check.done{background:var(--green-bg);border-color:var(--green)}
.hw-title{font-size:14px;font-weight:500;line-height:1.4}
.hw-done-text{text-decoration:line-through;color:var(--text3)}
.hw-due{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.hw-tag{font-size:10px;font-weight:700;padding:2px 5px;border-radius:6px;margin-left:4px;vertical-align:middle}
.tag-p{background:var(--blue-bg);color:var(--blue-dark)}
.tag-c{background:var(--accent-light);color:var(--accent-dark)}
.q-reply{margin-top:7px;padding:8px 10px;background:var(--accent-light);border-radius:var(--r-sm);font-size:12px;color:var(--accent-dark);line-height:1.5}
.q-pending{margin-top:4px;font-size:11px;color:var(--amber);font-weight:700}

/* ── PENDING ── */
.pending-card{background:var(--surface);border:2px solid var(--amber);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.approve-btn{padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.reject-btn{padding:7px 14px;background:transparent;color:var(--red);border:2px solid var(--red-bg);border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:6px}

/* ── SETTINGS ── */
.setting-group{margin-bottom:20px}
.setting-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding:0 4px}
.setting-item{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.setting-item-title{font-size:14px;font-weight:700}
.setting-item-sub{font-size:12px;color:var(--text2);margin-top:2px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.on{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}

/* ── FAB ── */
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:60;box-shadow:0 4px 16px rgba(232,80,10,.4)}
.fab.on{display:flex}

/* ── MISC ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text2);font-size:14px;gap:10px;font-weight:500}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;line-height:2;font-weight:500}
.seg{display:flex;background:var(--bg);border-radius:var(--r-sm);padding:3px;margin-bottom:12px;border:2px solid var(--border)}
.seg-btn{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:700;border-radius:6px;color:var(--text2);cursor:pointer}
.seg-btn.on{background:var(--surface);color:var(--text);border:1.5px solid var(--border2)}
.s-chk-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1.5px solid var(--border)}
.s-chk-row:last-child{border-bottom:none}
.s-chk{width:20px;height:20px;border-radius:5px;border:2.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.s-chk.on{background:var(--blue-bg);border-color:var(--blue)}
.class-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:16px;margin-bottom:10px}
.class-card:active{border-color:var(--accent);transform:scale(.98)}
.class-icon{width:52px;height:52px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.class-card-name{font-size:16px;font-weight:700}
.class-card-count{font-size:13px;color:var(--text2);margin-top:3px}
.class-header{display:flex;align-items:center;gap:10px;padding:16px;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:10}
.alert-item{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:8px}
.alert-item.unread{border-color:var(--accent);background:var(--accent-light)}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-text{font-size:13px;font-weight:500;line-height:1.5}
.alert-time{font-size:11px;color:var(--text3);margin-top:3px}
.tab-nav{background:var(--surface);border-bottom:2px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-item{flex:1;min-width:52px;padding:10px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s}
.tab-item.on{color:var(--accent);border-bottom-color:var(--accent)}
.show-more-btn{width:100%;padding:9px;background:var(--bg);border:2px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;margin-top:6px;font-family:inherit;transition:all .15s}
.show-more-btn:active{background:var(--border)}
.page-dots{display:flex;gap:5px;align-items:center;justify-content:center;margin-top:10px}
.page-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .15s;border:none;padding:0}
.page-dot.on{background:var(--accent);width:20px;border-radius:4px}
.show-more-btn{width:100%;padding:9px;background:var(--bg);border:2px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-weight:700;color:var(--accent);cursor:pointer;margin-top:8px;font-family:inherit}
.show-more-btn:active{opacity:.7}
.show-more-btn{width:100%;padding:9px;background:var(--bg);border:2px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-weight:700;color:var(--accent);cursor:pointer;margin-top:8px;font-family:inherit;transition:opacity .15s}
.show-more-btn:active{opacity:.6}
.role-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--r-sm);margin-bottom:12px;font-size:13px;font-weight:700;border:2px solid}
.t-banner{background:var(--accent-light);color:var(--accent-dark);border-color:#F5C4B3}
.s-banner{background:var(--blue-bg);color:var(--blue-dark);border-color:#B5D4F4}
@media(min-width:600px){.screen,.auth-wrap{max-width:480px;margin:0 auto}.screen{border-left:2px solid var(--border);border-right:2px solid var(--border)}}
</style>
</head>
<body>

<!-- ── AUTH ── -->
<div class="auth-wrap" id="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">학원 학생관리</div>
    <div class="auth-title" id="auth-title">로그인</div>
    <div class="auth-tabs">
      <div class="auth-tab on" onclick="setAuthMode('login')">로그인</div>
      <div class="auth-tab" onclick="setAuthMode('signup')">회원가입</div>
    </div>
    <div class="err" id="auth-err"></div>
    <div id="role-section" style="display:none">
      <div class="fl" style="margin-bottom:8px">역할 선택</div>
      <div class="role-select">
        <div class="role-btn on" id="role-owner" onclick="selectRole('owner')">
          <div class="role-btn-icon">🏫</div>
          <div class="role-btn-label">학원장</div>
          <div class="role-btn-sub">학원 등록·<br>학생 관리</div>
        </div>
        <div class="role-btn" id="role-student" onclick="selectRole('student')">
          <div class="role-btn-icon">🎓</div>
          <div class="role-btn-label">학생</div>
          <div class="role-btn-sub">학원 검색 후<br>가입 신청</div>
        </div>
      </div>
    </div>
    <div id="owner-section" style="display:none">
      <div class="fg"><label class="fl">학원 이름</label><input type="text" id="acad-name" placeholder="예: 스피킹짐 강남점"></div>
    </div>
    <div id="student-section" style="display:none">
      <div class="fg"><label class="fl">학원 검색</label>
        <div style="position:relative">
          <input type="text" id="acad-search" placeholder="학원 이름 검색..." oninput="searchAcademies(this.value)">
          <div class="acad-dropdown" id="acad-dropdown"></div>
        </div>
        <input type="hidden" id="acad-id">
        <div id="acad-selected" style="font-size:12px;color:var(--green);margin-top:4px;font-weight:700"></div>
      </div>

// ── AUTH ──────────────────────────────────────────────────────
function setAuthMode(m){
  authMode=m;

  $('role-section').style.display=m==='signup'?'block':'none';
  $('owner-section').style.display=m==='signup'&&selectedRole==='owner'?'block':'none';
  $('student-section').style.display=m==='signup'&&selectedRole==='student'?'block':'none';
  $('auth-err').classList.remove('on');
}
function selectRole(r){
  selectedRole=r;
  $('role-owner').classList.toggle('on',r==='owner');
  $('role-student').classList.toggle('on',r==='student');
  $('owner-section').style.display=r==='owner'?'block':'none';
  $('student-section').style.display=r==='student'?'block':'none';

async function searchAcademies(q){
  const dd=$('acad-dropdown');
  if(!q){dd.classList.remove('on');return}
  const {data}=await sb.from('academies').select('id,name').ilike('name','%'+q+'%').limit(8);
  if(!data?.length){dd.innerHTML='<div class="acad-item" style="color:var(--text2)">검색 결과 없음</div>';dd.classList.add('on');return}
  dd.innerHTML=data.map(a=>`<div class="acad-item" onclick="pickAcademy('${a.id}','${a.name.replace(/'/g,"\\'")}'">${a.name}</div>`).join('');
  dd.classList.add('on');
}
function pickAcademy(id,name){
  $('acad-id').value=id;$('acad-search').value=name;
  $('acad-selected').textContent='✓ '+name;$('acad-dropdown').classList.remove('on');
}
async function doAuth(){
  const email=$('a-email').value.trim(),pw=$('a-pw').value;
  if(!email||!pw){showErr('이메일과 비밀번호를 입력하세요');return}
  $('auth-err').classList.remove('on');
  if(authMode==='login'){
    const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){showErr(error.message);return}
    enterApp(data.user);
  } else {
    const pw2=$('a-pw2').value;
    if(pw!==pw2){showErr('비밀번호가 일치하지 않아요');return}
    if(selectedRole==='owner'){
      const name=($('acad-name').value||'').trim();
      if(!name){showErr('학원 이름을 입력하세요');return}
      const {data,error}=await sb.auth.signUp({email,password:pw});
      if(error){showErr(error.message);return}
      await sb.from('academies').insert({name,owner_id:data.user.id});
      enterApp(data.user);
    } else {
      const aId=$('acad-id').value;
      if(!aId){showErr('학원을 선택하세요');return}
      const sName=($('s-name').value||'').trim();
      if(!sName){showErr('이름을 입력하세요');return}
      const {data,error}=await sb.auth.signUp({email,password:pw});
      if(error){showErr(error.message);return}
      await sb.from('academy_members').insert({
        academy_id:aId,user_id:data.user.id,email,name:sName,
        phone:($('s-phone').value||'').trim(),
        level:$('s-level').value,goal:($('s-goal').value||'').trim(),
        status:'pending',attendance:[],feedback:[],homework:[],progress:{},questions:[]
      });
      enterApp(data.user);

}
function showErr(msg){const e=$('auth-err');e.textContent=msg;e.classList.add('on')}
async function doSignOut(){
  await sb.auth.signOut();
  user=null;academy=null;myMember=null;isOwner=false;isInstructor=false;members=[];
  ['app','app-wait','app-student'].forEach(id=>$(id).classList.remove('on'));
  $('auth-wrap').style.display='flex';$('fab').classList.remove('on');
}

// ── ENTER APP ─────────────────────────────────────────────────
async function enterApp(u){
  user=u;$('auth-wrap').style.display='none';
  const {data:ownedAcademy}=await sb.from('academies').select('*').eq('owner_id',u.id).single();
  if(ownedAcademy){
    isOwner=true;academy=ownedAcademy;
    $('app-title').textContent=academy.name;$('app-sub').textContent=u.email;
    $('app').classList.add('on');$('fab').classList.add('on');
    await loadAll();
  } else {
    const {data:membership}=await sb.from('academy_members').select('*,academies(name)').eq('user_id',u.id).single();
    if(!membership){showErr('가입 정보가 없어요. 학원을 검색해서 가입해주세요.');$('auth-wrap').style.display='flex';return}
    if(membership.status==='pending'){
      myMember=membership;
      $('wait-msg').textContent=`"${membership.academies?.name}" 학원의 승인을 기다리고 있어요`;
      $('app-wait').classList.add('on');
    } else {
      myMember=membership;showStudentApp();
    }
  }
}
async function checkApproval(){
  const {data}=await sb.from('academy_members').select('*,academies(name)').eq('user_id',user.id).single();
  if(data?.status==='approved'){myMember=data;$('app-wait').classList.remove('on');showStudentApp();toast('승인됐어요!')}
  else toast('아직 대기 중이에요');
}

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadAll(){
  $('list-content').innerHTML='<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  const [mRes,cRes,cmRes]=await Promise.all([
    sb.from('academy_members').select('*').eq('academy_id',academy.id).order('created_at'),
    sb.from('classes').select('*').eq('academy_id',academy.id).order('name'),
    sb.from('class_members').select('*')
  ]);
  members=mRes.data||[];classes=cRes.data||[];classMemberships=cmRes.data||[];
  renderList();updateBadges();renderSettings();buildAlerts();

// ── PAGE SWITCHING ─────────────────────────────────────────────
function switchPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  $('page-'+page).classList.add('on');
  $('nav-'+page)?.classList.add('on');
  $('back-btn').classList.remove('on');
  $('app-title').textContent=academy?.name||'학원관리';
  $('fab').style.display=page==='list'?'':'none';
  if(page==='list')renderList();
  if(page==='pending')renderPending();
  if(page==='alerts')renderAlerts();
  if(page==='settings')renderSettings();

// ── CLASS CARD LIST ──────────────────────────────────────────
const CLASS_COLORS=[
  {bg:'#FDF0EA',icon:'#E8500A'},{bg:'#EAF3FC',icon:'#1A6EBF'},
  {bg:'#E8F7EE',icon:'#1A8A4A'},{bg:'#F3EFFE',icon:'#6B21A8'},
  {bg:'#FFF4E0',icon:'#B86A00'},{bg:'#FDEAEA',icon:'#CC2222'}
];
const CLASS_EMOJIS=['📚','✏️','🌟','💪','🎯','🔥','📝','🏆'];

function renderList(){
  const el=$('list-content');
  const approved=members.filter(m=>m.status==='approved');
  if(!approved.length){
    el.innerHTML='<div class="empty-state">학생이 없어요<br>+ 버튼으로 추가하거나<br>승인 대기 탭에서 승인해주세요</div>';
    return;
  }
  // 반별 그룹
  const grouped={};
  approved.forEach(m=>{
    const mClasses=classMemberships.filter(cm=>cm.member_id===m.id).map(cm=>classes.find(c=>c.id===cm.class_id)?.name).filter(Boolean);
    if(!mClasses.length){if(!grouped['미배정'])grouped['미배정']=[];grouped['미배정'].push(m)}
    else mClasses.forEach(cn=>{if(!grouped[cn])grouped[cn]=[];grouped[cn].push(m)});
  });
  const classOrder=[...classes.map(c=>c.name),'미배정'];
  let html='';
  classOrder.forEach((cn,i)=>{
    if(!grouped[cn]?.length)return;
    const col=CLASS_COLORS[i%CLASS_COLORS.length];
    const emoji=CLASS_EMOJIS[i%CLASS_EMOJIS.length];
    const undone=grouped[cn].reduce((s,m)=>s+(m.homework||[]).filter(h=>!h.done).length,0);
    const unanswered=grouped[cn].reduce((s,m)=>s+(m.questions||[]).filter(q=>!q.reply).length,0);
    const alerts=[];
    if(undone>0)alerts.push(`<span class="badge b-amber" style="font-size:10px">숙제 ${undone}</span>`);
    if(unanswered>0)alerts.push(`<span class="badge b-red" style="font-size:10px">질문 ${unanswered}</span>`);
    html+=`<div class="class-card" onclick="openClassView('${cn}')">
      <div class="class-icon" style="background:${col.bg}"><span style="color:${col.icon}">${emoji}</span></div>
      <div style="flex:1;min-width:0">
        <div class="class-card-name">${cn}</div>
        <div class="class-card-count">${grouped[cn].length}명</div>
        ${alerts.length?`<div style="display:flex;gap:4px;margin-top:5px">${alerts.join('')}</div>`:''}
      </div>
      <div style="font-size:20px;color:var(--text3)">›</div>
    </div>`;
  });
  el.innerHTML=html||'<div class="empty-state">반을 먼저 만들어주세요</div>';
}

// ── CLASS INNER VIEW ──────────────────────────────────────────
let currentClassName='';
function openClassView(className){
  currentClassName=className;
  $('back-btn').classList.add('on');
  $('app-title').textContent=className;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  $('page-class').classList.add('on');
  $('fab').style.display='none';
  renderClassView(className,'');
}

function renderClassView(className,q){
  const approved=members.filter(m=>m.status==='approved');
  const filtered=approved.filter(m=>{
    const mClasses=classMemberships.filter(cm=>cm.member_id===m.id).map(cm=>classes.find(c=>c.id===cm.class_id)?.name).filter(Boolean);
    const inClass=className==='미배정'?!mClasses.length:mClasses.includes(className);
    if(!inClass)return false;
    if(!q)return true;
    return (m.name||'').toLowerCase().includes(q)||(m.email||'').includes(q);
  });
  const el=$('page-class');
  el.innerHTML=`
    <div class="class-header">
      <input type="text" placeholder="이름 검색..." style="flex:1;margin:0" oninput="renderClassView('${className}',this.value)" value="${q}">
      <span style="font-size:13px;color:var(--text2);font-weight:700;flex-shrink:0;margin-left:8px">${filtered.length}명</span>
    </div>
    <div style="padding:12px 16px">
      ${filtered.length?filtered.map((m,i)=>{
        const att=m.attendance||[];
        const done=att.filter(a=>a.status==='attended').length;
        const rate=att.length?Math.round(done/att.length*100):null;
        const rb=rate!==null?`<span class="badge ${rate>=80?'b-green':rate>=60?'b-amber':'b-red'}">${rate}%</span>`:'';
        const undone=(m.homework||[]).filter(h=>!h.done).length;
        const unanswered=(m.questions||[]).filter(q=>!q.reply).length;
        const alerts=[];
        if(undone>0)alerts.push(`<span class="badge b-amber" style="font-size:10px">숙제 ${undone}</span>`);
        if(unanswered>0)alerts.push(`<span class="badge b-red" style="font-size:10px">질문 ${unanswered}</span>`);
        return`<div class="s-card" onclick="openDetail('${m.id}')"><div class="s-row">
          <div class="avatar ${avC(i)}">${(m.name||'?').slice(0,2)}</div>
          <div style="flex:1;min-width:0">
            <div class="s-name">${m.name||m.email}</div>
            <div class="s-meta">${m.level||'레벨 미설정'} · ${m.goal||'목표 미설정'}</div>
            ${alerts.length?`<div style="display:flex;gap:4px;margin-top:4px">${alerts.join('')}</div>`:''}
          </div>
          <div>${rb}</div>
        </div></div>`;
      }).join(''):'<div class="empty-state">검색 결과가 없어요</div>'}
    </div>`;
}

// ── PENDING ────────────────────────────────────────────────────
function renderPending(){
  const pending=members.filter(m=>m.status==='pending');
  const el=$('pending-content');
  if(!pending.length){el.innerHTML='<div class="empty-state">대기 중인 학생이 없어요</div>';return}
  el.innerHTML=pending.map(m=>`<div class="pending-card">
    <div class="s-row" style="margin-bottom:10px">
      <div class="avatar" style="background:var(--amber-bg);color:var(--amber);border-color:var(--amber)">${(m.name||'?').slice(0,2)}</div>
      <div style="flex:1"><div class="s-name">${m.name||'이름 미설정'}</div>
        <div class="s-meta">${m.email}</div>
        <div class="s-meta">${[m.level,m.goal].filter(Boolean).join(' · ')}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="approve-btn" style="flex:1" onclick="approveMember('${m.id}')">✓ 승인</button>
      <button class="reject-btn" style="flex:1" onclick="rejectMember('${m.id}')">✕ 거절</button>
    </div>
  </div>`).join('');
}
async function approveMember(id){
  await sb.from('academy_members').update({status:'approved'}).eq('id',id);
  const m=members.find(x=>x.id===id);if(m)m.status='approved';
  renderPending();renderList();updateBadges();toast('승인됐어요!');
}
async function rejectMember(id){
  if(!confirm('거절하면 신청이 삭제돼요. 계속할까요?'))return;
  await sb.from('academy_members').delete().eq('id',id);
  members=members.filter(x=>x.id!==id);
  renderPending();updateBadges();toast('거절됐어요');
}

// ── BADGES ────────────────────────────────────────────────────
function updateBadges(){
  const pending=members.filter(m=>m.status==='pending').length;
  const badge=$('badge-pending');
  if(badge){badge.textContent=pending;badge.classList.toggle('on',pending>0)}
  buildAlerts();
}

// ── STUDENT DETAIL ────────────────────────────────────────────
function openDetail(id){
  currentMemberId=id;
  const m=members.find(x=>x.id===id);if(!m)return;
  $('back-btn').classList.add('on');
  $('app-title').textContent=m.name||m.email;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  $('page-detail').classList.add('on');
  $('fab').style.display='none';
  renderDetail(m);
}

function goBack(){
  if(currentMemberId){
    // 학생 상세 → 반 뷰 or 목록
    currentMemberId=null;
    if(currentClassName){
      $('back-btn').classList.add('on');
      $('app-title').textContent=currentClassName;
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
      $('page-class').classList.add('on');
      $('fab').style.display='none';
      renderClassView(currentClassName,'');
    } else {
      switchPage('list');
    }
  } else if(currentClassName){
    // 반 뷰 → 목록
    currentClassName='';
    switchPage('list');
  } else {
    switchPage('list');
  }
}

function renderDetail(m){
  const att=m.attendance||[];
  const done=att.filter(a=>a.status==='attended').length;
  const rate=att.length?Math.round(done/att.length*100):0;
  const hw=m.homework||[];
  const prog=m.progress||{};
  const qs=m.questions||[];
  const CAT_CLASS={발음:'b-blue',문법:'b-orange',어휘:'b-amber',유창성:'b-green',표현력:'b-purple',기타:'b-gray'};
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // 달력 생성
  function buildCal(y,mo){
    const first=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate();
    let html='';
    for(let i=0;i<first;i++)html+='<div class="cal-day emp"></div>';
    for(let d=1;d<=days;d++){
      const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const rec=att.find(a=>a.date===ds);
      const isToday=ds===todayStr;
      let cls='cal-day clickable';
      if(rec?.status==='attended')cls+=' att';else if(rec?.status==='absent')cls+=' abs';
      if(isToday)cls+=' today';
      html+=`<div class="${cls}" onclick="toggleAtt('${m.id}','${ds}')">${d}</div>`;
    }
    return html;
  }
  const mStr=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const mn=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const mAtt=att.filter(a=>a.date.startsWith(mn));

  $('page-detail').innerHTML=`
    <div style="padding:16px">
      <!-- 요약 통계 -->
      <div class="stat-grid">
        <div class="stat"><div class="stat-v">${done}</div><div class="stat-l">출석</div></div>
        <div class="stat"><div class="stat-v" style="color:${rate>=80?'var(--green)':rate>=60?'var(--amber)':'var(--red)'}">${rate}%</div><div class="stat-l">출석률</div></div>
        <div class="stat"><div class="stat-v">${hw.filter(h=>h.done).length}/${hw.length}</div><div class="stat-l">숙제</div></div>
        <div class="stat"><div class="stat-v">${qs.filter(q=>!q.reply).length}</div><div class="stat-l">미답변</div></div>
      </div>

      <!-- 기본정보 -->
      <div class="card">
        <div class="section-header">
          <div class="card-title" style="margin:0">기본 정보</div>
          <button class="btn btn-sm" onclick="openEditMember('${m.id}')">수정</button>
        </div>
        <table class="info-tbl" style="margin-top:8px">
          <tr><td>반</td><td>
            ${(()=>{
              const mClasses=classMemberships.filter(cm=>cm.member_id===m.id).map(cm=>classes.find(c=>c.id===cm.class_id)?.name).filter(Boolean);
              return `<span style="margin-right:6px">${mClasses.length?mClasses.join(', '):'미배정'}</span><span style="color:var(--accent);font-size:12px;cursor:pointer;font-weight:700" onclick="openAssignClass('${m.id}')">변경</span>`;
            })()}
          </td></tr>
          <tr><td>연락처</td><td>${m.phone||'—'}</td></tr>
          <tr><td>이메일</td><td>${m.email||'—'}</td></tr>
          <tr><td>레벨</td><td>${m.level||'—'}</td></tr>
          <tr><td>목표</td><td>${m.goal||'—'}</td></tr>
          <tr><td>등록일</td><td>${m.enroll_date||'—'}</td></tr>
          <tr><td>재등록</td><td style="${m.reenroll_date?'color:var(--amber);font-weight:700':''}">${m.reenroll_date||'—'}</td></tr>
        </table>
      </div>

      <!-- 출석 -->
      <div class="card">
        <div class="card-title">출석</div>
        <div class="month-nav">
          <button class="btn btn-sm" onclick="changeDetailMonth(-1,'${m.id}')">←</button>
          <span>${calYear}년 ${mStr[calMonth]}</span>
          <button class="btn btn-sm" onclick="changeDetailMonth(1,'${m.id}')">→</button>
        </div>
        <div class="cal-hdr"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
        <div class="cal-grid">${buildCal(calYear,calMonth)}</div>
        <div class="att-sum" style="margin-top:10px">이번달 출석 <b>${mAtt.filter(a=>a.status==='attended').length}회</b> / 결석 <b>${mAtt.filter(a=>a.status==='absent').length}회</b></div>
      </div>

      <!-- 진행도 -->
      <div class="card">
        <div class="card-title">진행도</div>
        ${PROG.map(({k,l,c})=>`<div class="prog-row">
          <div class="prog-lrow"><span class="prog-lbl">${l}</span><span class="prog-val" id="pv-${k}" style="color:${c}">${prog[k]||0}%</span></div>
          <div class="prog-bar"><div class="prog-fill" id="pf-${k}" style="width:${prog[k]||0}%;background:${c}"></div></div>
          <input type="range" min="0" max="100" value="${prog[k]||0}" step="5" oninput="updateProg('${m.id}','${k}',this.value)">
        </div>`).join('')}
        <div style="margin-top:8px"><label class="fl">메모</label>
          <textarea id="prog-memo" placeholder="레벨 메모...">${m.notes||''}</textarea>
          <button class="btn btn-sm btn-full" style="margin-top:6px" onclick="saveMemo('${m.id}')">메모 저장</button>
        </div>
      </div>

      <!-- 피드백 -->
      <div class="card">
        <div class="card-title">피드백</div>
        ${[...(m.feedback||[])].reverse().map(f=>`<div class="item-row">
          <div class="item-meta"><span class="badge ${CAT_CLASS[f.category?.split(',')[0]?.trim()]||'b-gray'}">${f.category||'기타'}</span><span class="item-date">${f.date}</span></div>
          <div class="item-text">${f.text}</div>
        </div>`).join('')||'<div style="font-size:13px;color:var(--text2);padding:8px 0">피드백이 없어요</div>'}
        <div class="divider"></div>
        <div class="fg"><label class="fl">카테고리 (복수선택)</label>
          <div class="chip-row" id="fb-chips">${FB_CATS.map((c,i)=>`<div class="chip${c==='기타'?' chip-dash':''}${i===0?' on':''}" onclick="this.classList.toggle('on')">${c}</div>`).join('')}</div>
        </div>
        <div class="fg"><textarea id="fb-text" placeholder="피드백 내용..."></textarea></div>
        <button class="btn btn-primary btn-full" onclick="addFeedback('${m.id}')">피드백 저장</button>
      </div>

      <!-- 숙제 -->
      <div class="card">
        <div class="card-title">숙제</div>
        <div id="hw-list-${m.id}">
          ${hw.length?[...hw].reverse().map((h,ri)=>{
            const i=hw.length-1-ri;
            const tag=`<span class="hw-tag ${h.type==='common'?'tag-c':'tag-p'}">${h.type==='common'?'공통':'개별'}</span>`;
            return`<div class="hw-row">
              <div class="hw-check ${h.done?'done':''}" onclick="toggleHW('${m.id}',${i})">${h.done?`<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#1A8A4A" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:''}</div>
              <div style="flex:1"><div class="hw-title ${h.done?'hw-done-text':''}">${h.title}${tag}</div>${h.due?`<div class="hw-due">마감 ${h.due}${h.done?' · 완료':''}</div>`:''}</div>
            </div>`;
          }).join(''):'<div style="font-size:13px;color:var(--text2);padding:8px 0">숙제가 없어요</div>'}
        </div>
        <div class="divider"></div>
        <div class="seg" id="hw-seg">
          <div class="seg-btn ${hwMode==='personal'?'on':''}" onclick="setHwMode('personal','${m.id}')">개별</div>
          <div class="seg-btn ${hwMode==='common'?'on':''}" onclick="setHwMode('common','${m.id}')">공통</div>
        </div>
        <div id="hw-form-${m.id}"></div>
      </div>

      <!-- 질문 -->
      <div class="card">
        <div class="card-title">질문</div>
        ${[...(m.questions||[])].reverse().map((q,ri)=>{
          const i=(m.questions.length-1-ri);
          return`<div class="item-row">
            <div class="item-meta"><span class="badge b-blue">질문</span><span class="item-date">${q.date}</span></div>
            <div class="item-text">${q.text}</div>
            ${q.reply?`<div class="q-reply">💬 ${q.reply}</div>`
            :`<div style="display:flex;gap:6px;margin-top:8px">
                <input type="text" id="rep-${i}" placeholder="답변 입력..." style="flex:1">
                <button class="btn btn-sm btn-primary" onclick="replyQ('${m.id}',${i})">답변</button>
              </div>`}
          </div>`;
        }).join('')||'<div style="font-size:13px;color:var(--text2);padding:8px 0">질문이 없어요</div>'}
      </div>

      <!-- 위험 -->
      <button class="btn btn-danger btn-full" onclick="deleteMember('${m.id}')">학생 삭제</button>
    </div>`;

  renderHwForm(m);
}

function changeDetailMonth(d,mid){
  calMonth+=d;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}
  const m=members.find(x=>x.id===mid);if(m)renderDetail(m);
}

// ── ATTENDANCE ────────────────────────────────────────────────
async function toggleAtt(mid,date){
  const m=members.find(x=>x.id===mid);if(!m)return;
  if(!m.attendance)m.attendance=[];
  const i=m.attendance.findIndex(a=>a.date===date);
  if(i===-1)m.attendance.push({date,status:'attended'});
  else if(m.attendance[i].status==='attended')m.attendance[i].status='absent';
  else m.attendance.splice(i,1);
  await sb.from('academy_members').update({attendance:m.attendance}).eq('id',mid);
  renderDetail(m);
}

// ── PROGRESS ──────────────────────────────────────────────────
async function updateProg(mid,key,val){
  const m=members.find(x=>x.id===mid);if(!m)return;
  if(!m.progress)m.progress={};m.progress[key]=parseInt(val);
  $('pv-'+key).textContent=val+'%';$('pf-'+key).style.width=val+'%';
  await sb.from('academy_members').update({progress:m.progress}).eq('id',mid);
}
async function saveMemo(mid){
  const m=members.find(x=>x.id===mid);if(!m)return;
  m.notes=$('prog-memo')?.value||'';
  await sb.from('academy_members').update({notes:m.notes}).eq('id',mid);
  toast('메모 저장됐어요');
}

// ── FEEDBACK ──────────────────────────────────────────────────
async function addFeedback(mid){
  const text=$('fb-text')?.value.trim();if(!text){toast('내용을 입력하세요');return}
  const cats=[...document.querySelectorAll('#fb-chips .chip.on')].map(c=>c.textContent);
  const cat=cats.length?cats.join(', '):'기타';
  const m=members.find(x=>x.id===mid);
  if(!m.feedback)m.feedback=[];
  m.feedback.push({date:new Date().toLocaleDateString('ko-KR'),category:cat,text});
  $('fb-text').value='';
  await sb.from('academy_members').update({feedback:m.feedback}).eq('id',mid);
  renderDetail(m);updateBadges();toast('피드백 저장됐어요');
}

// ── HOMEWORK ──────────────────────────────────────────────────
function setHwMode(mode,mid){
  hwMode=mode;
  document.querySelectorAll('#hw-seg .seg-btn').forEach((b,i)=>b.classList.toggle('on',i===(mode==='personal'?0:1)));
  const m=members.find(x=>x.id===mid);if(m)renderHwForm(m);
}
function renderHwForm(m){
  const el=$('hw-form-'+m.id);if(!el)return;
  const approved=members.filter(x=>x.status==='approved');
  if(hwMode==='personal'){
    el.innerHTML=`<div class="fg"><input type="text" id="hw-title" placeholder="예: Unit 4 섀도잉 10분"></div>
      <div class="fg"><input type="date" id="hw-due" value="${new Date().toISOString().split('T')[0]}"></div>
      <button class="btn btn-primary btn-full" onclick="addHwPersonal('${m.id}')">개별 숙제 추가</button>`;
  } else {
    if(hwSel.size===0)approved.forEach(s=>hwSel.add(s.id));
    el.innerHTML=`<div class="fg"><input type="text" id="hw-title" placeholder="공통 숙제 내용"></div>
      <div class="fg"><input type="date" id="hw-due" value="${new Date().toISOString().split('T')[0]}"></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span class="fl" style="margin:0">대상 학생</span>
        <span style="font-size:12px;color:var(--text2);font-weight:700">${hwSel.size}/${approved.length}명</span>
      </div>
      <div style="background:var(--bg);border:2px solid var(--border);border-radius:var(--r-sm);padding:4px 10px;margin-bottom:8px;cursor:pointer;font-size:13px;font-weight:700;color:var(--accent)" onclick="toggleAllHw('${m.id}')">${hwSel.size===approved.length?'전체 해제':'전체 선택'}</div>
      ${approved.map(s=>`<div class="s-chk-row">
        <div class="s-chk ${hwSel.has(s.id)?'on':''}" id="hws-${s.id}" onclick="toggleHwSel('${s.id}','${m.id}')">
          ${hwSel.has(s.id)?`<svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="#1A6EBF" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:''}
        </div>
        <span style="font-size:14px;font-weight:700">${s.name||s.email}</span>
      </div>`).join('')}
      <button class="btn btn-primary btn-full" style="margin-top:10px" onclick="addHwCommon('${m.id}')">${hwSel.size}명에게 숙제 추가</button>`;
  }
}
function toggleHwSel(sid,mid){if(hwSel.has(sid))hwSel.delete(sid);else hwSel.add(sid);const m=members.find(x=>x.id===mid);if(m)renderHwForm(m)}
function toggleAllHw(mid){const approved=members.filter(x=>x.status==='approved');if(hwSel.size===approved.length)hwSel.clear();else approved.forEach(s=>hwSel.add(s.id));const m=members.find(x=>x.id===mid);if(m)renderHwForm(m)}

async function addHwPersonal(mid){
  const title=$('hw-title')?.value.trim();if(!title){toast('내용을 입력하세요');return}
  const due=$('hw-due')?.value;
  const m=members.find(x=>x.id===mid);
  if(!m.homework)m.homework=[];
  m.homework.push({title,due,done:false,type:'personal'});
  await sb.from('academy_members').update({homework:m.homework}).eq('id',mid);
  renderDetail(m);updateBadges();toast('숙제 추가됐어요');
}
async function addHwCommon(mid){
  if(!hwSel.size){toast('학생을 선택하세요');return}
  const title=$('hw-title')?.value.trim();if(!title){toast('내용을 입력하세요');return}
  const due=$('hw-due')?.value;
  const cnt=hwSel.size;
  for(const m of members.filter(x=>hwSel.has(x.id))){
    if(!m.homework)m.homework=[];
    m.homework.push({title,due,done:false,type:'common'});
    await sb.from('academy_members').update({homework:m.homework}).eq('id',m.id);
  }
  hwSel.clear();
  const cur=members.find(x=>x.id===mid);if(cur)renderDetail(cur);
  updateBadges();toast(`${cnt}명에게 숙제 추가됐어요`);
}
async function toggleHW(mid,i){
  const m=members.find(x=>x.id===mid);if(!m||!m.homework[i])return;
  m.homework[i].done=!m.homework[i].done;
  if(m.homework[i].done)m.homework[i].doneDate=new Date().toLocaleDateString('ko-KR');
  await sb.from('academy_members').update({homework:m.homework}).eq('id',mid);
  const hwEl=$('hw-list-'+mid);
  if(hwEl){
    const hw=m.homework;
    hwEl.innerHTML=[...hw].reverse().map((h,ri)=>{
      const idx=hw.length-1-ri;
      const tag=`<span class="hw-tag ${h.type==='common'?'tag-c':'tag-p'}">${h.type==='common'?'공통':'개별'}</span>`;
      return`<div class="hw-row">
        <div class="hw-check ${h.done?'done':''}" onclick="toggleHW('${mid}',${idx})">${h.done?`<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#1A8A4A" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:''}</div>
        <div style="flex:1"><div class="hw-title ${h.done?'hw-done-text':''}">${h.title}${tag}</div>${h.due?`<div class="hw-due">마감 ${h.due}${h.done?' · 완료':''}</div>`:''}</div>
      </div>`;
    }).join('');
  }
  updateBadges();
}

// ── QUESTIONS ─────────────────────────────────────────────────
async function replyQ(mid,i){
  const reply=$('rep-'+i)?.value.trim();if(!reply){toast('답변을 입력하세요');return}
  const m=members.find(x=>x.id===mid);if(!m)return;
  m.questions[i].reply=reply;m.questions[i].replyDate=new Date().toLocaleDateString('ko-KR');
  await sb.from('academy_members').update({questions:m.questions}).eq('id',mid);
  renderDetail(m);updateBadges();toast('답변을 보냈어요!');
}

// ── ADD/EDIT MEMBER ───────────────────────────────────────────
function openAddStudent(){
  $('modal-title').textContent='학생 추가';
  $('modal-body').innerHTML=memberForm(null);
  $('modal').classList.add('on');
}
function openEditMember(id){
  const m=members.find(x=>x.id===id);
  $('modal-title').textContent='학생 정보 수정';
  $('modal-body').innerHTML=memberForm(m);
  $('modal').classList.add('on');
}
function memberForm(m){
  return`<div class="fg"><label class="fl">이름 *</label><input type="text" id="f-name" value="${m?.name||''}"></div>
  <div class="row2">
    <div class="fg"><label class="fl">연락처</label><input type="tel" id="f-phone" value="${m?.phone||''}"></div>
    <div class="fg"><label class="fl">이메일</label><input type="email" id="f-email" value="${m?.email||''}"></div>
  </div>
  <div class="row2">
    <div class="fg"><label class="fl">레벨</label><select id="f-level">${['','입문','초급','중급','중상급','고급'].map(l=>`<option value="${l}"${m?.level===l?' selected':''}>${l||'선택'}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">학습목표</label><input type="text" id="f-goal" value="${m?.goal||''}" placeholder="비즈니스 등"></div>
  </div>
  <div class="row2">
    <div class="fg"><label class="fl">등록일</label><input type="date" id="f-enroll" value="${m?.enroll_date||''}"></div>
    <div class="fg"><label class="fl">재등록 예정</label><input type="date" id="f-reenroll" value="${m?.reenroll_date||''}"></div>
  </div>
  <button class="btn btn-primary btn-full" onclick="saveMember('${m?.id||''}')">${m?'수정 저장':'학생 추가'}</button>`;
}
async function saveMember(id){
  const name=$('f-name')?.value.trim();if(!name){toast('이름을 입력하세요');return}
  const d={name,phone:$('f-phone')?.value.trim(),email:$('f-email')?.value.trim(),
    level:$('f-level')?.value,goal:$('f-goal')?.value.trim(),
    enroll_date:$('f-enroll')?.value||null,reenroll_date:$('f-reenroll')?.value||null};
  if(id){
    await sb.from('academy_members').update(d).eq('id',id);
    const m=members.find(x=>x.id===id);if(m)Object.assign(m,d);
    closeModal();renderDetail(m);
  } else {
    const {data}=await sb.from('academy_members').insert({
      academy_id:academy.id,user_id:user.id,status:'approved',
      ...d,attendance:[],feedback:[],homework:[],progress:{},questions:[]
    }).select().single();
    if(data)members.push(data);
    closeModal();renderList();
  }
  toast(id?'수정됐어요':'학생이 추가됐어요');
}
async function deleteMember(id){
  if(!confirm('정말 삭제할까요?'))return;
  await sb.from('academy_members').delete().eq('id',id);
  members=members.filter(x=>x.id!==id);

async function addClass(){
  const name=($('new-class-name')?.value||'').trim();
  if(!name){toast('반 이름을 입력하세요');return}
  const {data}=await sb.from('classes').insert({academy_id:academy.id,name}).select().single();
  if(data){classes.push(data);$('new-class-name').value='';renderSettings();renderList();toast('반이 추가됐어요')}
}
function openEditClass(id,name){
  $('modal-title').textContent='반 이름 수정';
  $('modal-body').innerHTML=`<div class="fg"><label class="fl">반 이름</label><input type="text" id="edit-class-name" value="${name}"></div>
    <button class="btn btn-primary btn-full" onclick="saveClassName('${id}')">저장</button>`;
  $('modal').classList.add('on');
}
async function saveClassName(id){
  const name=($('edit-class-name')?.value||'').trim();if(!name){toast('이름을 입력하세요');return}
  await sb.from('classes').update({name}).eq('id',id);
  const c=classes.find(x=>x.id===id);if(c)c.name=name;
  closeModal();renderSettings();renderList();toast('수정됐어요');
}
async function deleteClass(id){
  if(!confirm('삭제할까요?'))return;
  await sb.from('classes').delete().eq('id',id);
  classes=classes.filter(x=>x.id!==id);classMemberships=classMemberships.filter(x=>x.class_id!==id);
  renderSettings();renderList();toast('삭제됐어요');
}
function openAssignClass(memberId){
  const m=members.find(x=>x.id===memberId);
  const currentIds=classMemberships.filter(cm=>cm.member_id===memberId).map(cm=>cm.class_id);
  $('modal-title').textContent=`${m?.name||'학생'} 반 배정`;
  $('modal-body').innerHTML=`
    <div style="margin-bottom:12px;font-size:13px;color:var(--text2)">반을 선택하세요 (복수 가능)</div>
    ${classes.map(c=>`<div class="s-chk-row">
      <div class="s-chk ${currentIds.includes(c.id)?'on':''}" id="cchk-${c.id}" onclick="toggleClassChk('${c.id}')">
        ${currentIds.includes(c.id)?`<svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="#1A6EBF" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:''}
      </div>
      <span style="font-size:14px;font-weight:700">${c.name}</span>
    </div>`).join('')||'<div class="empty-state">반이 없어요. 먼저 반을 만들어주세요.</div>'}
    <button class="btn btn-primary btn-full" style="margin-top:12px" onclick="saveClassAssign('${memberId}')">저장</button>`;
  $('modal').classList.add('on');
}
function toggleClassChk(classId){
  const el=$('cchk-'+classId);if(!el)return;
  const isOn=el.classList.toggle('on');
  el.innerHTML=isOn?`<svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="#1A6EBF" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:'';
}
async function saveClassAssign(memberId){
  const selectedIds=classes.filter(c=>$('cchk-'+c.id)?.classList.contains('on')).map(c=>c.id);
  await sb.from('class_members').delete().eq('member_id',memberId);
  classMemberships=classMemberships.filter(x=>x.member_id!==memberId);
  if(selectedIds.length){
    const {data}=await sb.from('class_members').insert(selectedIds.map(class_id=>({class_id,member_id:memberId}))).select();
    if(data)classMemberships=[...classMemberships,...data];
  }
  closeModal();renderSettings();renderList();toast('반 배정 저장됐어요');
}

function renderStudentStats(){
  const m=myMember;if(!m)return;
  const el=$('student-stats');if(!el)return;
  const att=m.attendance||[];
  const hw=m.homework||[];
  const fb=m.feedback||[];
  // 해당 월 출석/숙제
  const mn=`${sCalYear}-${String(sCalMonth+1).padStart(2,'0')}`;
  const mAtt=att.filter(a=>a.date.startsWith(mn));
  const mAttDone=mAtt.filter(a=>a.status==='attended').length;
  // 해당 월 숙제 (마감일 기준)
  const mHw=hw.filter(h=>h.due&&h.due.startsWith(mn.slice(0,7)));
  const mHwDone=mHw.filter(h=>h.done).length;

  const mStr=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function renderStudentAtt(){
  const m=myMember;if(!m)return;
  const el=$('s-page-att');if(!el)return;
  const att=m.attendance||[];
  const mStr=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const mn=`${sCalYear}-${String(sCalMonth+1).padStart(2,'0')}`;
  const mAtt=att.filter(a=>a.date.startsWith(mn));
  const todayStr=new Date().toISOString().split('T')[0];
  const first=new Date(sCalYear,sCalMonth,1).getDay();
  const days=new Date(sCalYear,sCalMonth+1,0).getDate();
  let cal='';
  for(let i=0;i<first;i++)cal+='<div class="cal-day emp"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${sCalYear}-${String(sCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec=att.find(a=>a.date===ds);
    let cls='cal-day';
    if(rec?.status==='attended')cls+=' att';
    else if(rec?.status==='absent')cls+=' abs';
    if(ds===todayStr)cls+=' today';
    cal+=`<div class="${cls}">${d}</div>`;
  }
  const totalDone=att.filter(a=>a.status==='attended').length;
  el.innerHTML=`<div style="padding:16px">
    <div class="card">
      <div class="month-nav">
        <button class="btn btn-sm" onclick="changeStudentMonth(-1)">←</button>
        <span>${sCalYear}년 ${mStr[sCalMonth]}</span>
        <button class="btn btn-sm" onclick="changeStudentMonth(1)">→</button>
      </div>
      <div class="cal-hdr"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
      <div class="cal-grid">${cal}</div>
      <div class="att-sum" style="margin-top:10px">
        이번달 출석 <b>${mAtt.filter(a=>a.status==='attended').length}회</b> / 결석 <b>${mAtt.filter(a=>a.status==='absent').length}회</b>
        <span style="margin-left:12px;color:var(--text3)">전체 <b>${totalDone}회</b></span>
      </div>
    </div>
  </div>`;
}

let sCalMonth=new Date().getMonth(),sCalYear=new Date().getFullYear();
function changeStudentMonth(d){
  sCalMonth+=d;
  if(sCalMonth>11){sCalMonth=0;sCalYear++}
  if(sCalMonth<0){sCalMonth=11;sCalYear--}
  renderStudentStats();
  renderStudentAtt();
  // 현재 탭도 갱신
  const activeTab=document.querySelector('#student-tab-nav .tab-item.on');
  if(activeTab){
    const tabId=activeTab.id.replace('stab-','');
    if(tabId==='progress')renderStudentProgress();
    if(tabId==='hw')renderStudentHw();
  }
}
async function toggleMyHW(i){
  if(!myMember?.homework[i])return;
  const h=myMember.homework[i];
  // 마감일이 지났으면 체크 불가
  if(!h.done&&h.due){
    const due=new Date(h.due);due.setHours(23,59,59);
    if(due<new Date()){toast('마감일이 지난 숙제예요');return}
  }
  h.done=!h.done;
  await sb.from('academy_members').update({homework:myMember.homework}).eq('id',myMember.id);
  renderStudentView();
}
async function submitMyQuestion(){
  const text=$('my-q-text')?.value.trim();if(!text){toast('질문을 입력하세요');return}
  if(!myMember.questions)myMember.questions=[];
  myMember.questions.push({date:new Date().toLocaleDateString('ko-KR'),text,reply:null});
  $('my-q-text').value='';
  await sb.from('academy_members').update({questions:myMember.questions}).eq('id',myMember.id);
  renderStudentQ();renderStudentStats();toast('질문을 보냈어요!');
}

// ── ALERTS ───────────────────────────────────────────────────
let alerts=[];

function buildAlerts(){
  alerts=[];
  const approved=members.filter(m=>m.status==='approved');
  const today=new Date().toLocaleDateString('ko-KR');

  approved.forEach(m=>{
    // 새 질문 (미답변)
    (m.questions||[]).forEach((q,i)=>{
      if(!q.reply){
        alerts.push({
          type:'question',icon:'❓',
          text:`${m.name||m.email}님이 질문을 남겼어요`,
          sub:q.text.length>40?q.text.slice(0,40)+'...':q.text,
          time:q.date,memberId:m.id,unread:true
        });
      }
    });
    // 숙제 완료
    (m.homework||[]).forEach((h,i)=>{
      if(h.done&&h.doneDate===today){
        alerts.push({
          type:'hw-done',icon:'✅',
          text:`${m.name||m.email}님이 숙제를 완료했어요`,
          sub:h.title,time:today,memberId:m.id,unread:true
        });
      }
    });
    // 미완료 숙제 (마감 지남)
    const todayDate=new Date();
    (m.homework||[]).forEach(h=>{
      if(!h.done&&h.due){
        const due=new Date(h.due);
        if(due<todayDate){
          alerts.push({
            type:'hw-late',icon:'⚠️',
            text:`${m.name||m.email}님 숙제 마감 지남`,
            sub:h.title+' (마감: '+h.due+')',
            time:h.due,memberId:m.id,unread:false
          });
        }
      }
    });
    // 승인 대기
  });

  // 최신순 정렬
  alerts.sort((a,b)=>new Date(b.time)-new Date(a.time));

  // 미답변 질문 배지
  const unread=alerts.filter(a=>a.unread).length;
  const badge=$('badge-alerts');
  if(badge){badge.textContent=unread;badge.classList.toggle('on',unread>0)}
}

function renderAlerts(){
  buildAlerts();
  const el=$('page-alerts');if(!el)return;
  if(!alerts.length){
    el.innerHTML='<div style="padding:16px"><div class="empty-state">새로운 알림이 없어요 🎉</div></div>';
    return;
  }
  const typeLabel={question:'질문','hw-done':'숙제 완료','hw-late':'숙제 미완료'};
  el.innerHTML=`<div style="padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:13px;color:var(--text2);font-weight:700">총 ${alerts.length}개</span>
    </div>
    ${alerts.map(a=>`<div class="alert-item ${a.unread?'unread':''}" onclick="openDetail('${a.memberId}')">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span class="alert-icon">${a.icon}</span>
        <div style="flex:1;min-width:0">
          <div class="alert-text">${a.text}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.sub}</div>
          <div class="alert-time">${a.time}</div>
        </div>
        <span class="badge ${a.type==='question'?'b-red':a.type==='hw-done'?'b-green':'b-amber'}" style="font-size:10px;flex-shrink:0">${typeLabel[a.type]||''}</span>
      </div>
    </div>`).join('')}
  </div>`;
}

// ── MODAL / UTIL ──────────────────────────────────────────────
function closeModal(e){if(!e||e.target===$('modal'))$('modal').classList.remove('on')}
(async()=>{const{data:{session}}=await sb.auth.getSession();if(session?.user)enterApp(session.user)})();
</script>
