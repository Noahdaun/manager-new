<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="학원관리">
<meta name="theme-color" content="#E8500A">
<link rel="manifest" href="manifest.json">
<title>학원 학생관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --bg:#F0EDE8;--surface:#FFF;--border:#DDD9D2;--border2:#C8C4BC;
  --text:#1C1A17;--text2:#5C5750;--text3:#9C9890;
  --accent:#E8500A;--accent-light:#FDF0EA;--accent-dark:#C43E05;
  --blue:#1A6EBF;--blue-bg:#EAF3FC;--blue-dark:#0C4A8A;
  --green:#1A8A4A;--green-bg:#E8F7EE;
  --amber:#B86A00;--amber-bg:#FFF4E0;
  --red:#CC2222;--red-bg:#FDEAEA;
  --purple:#6B21A8;--purple-bg:#F3EFFE;
  --r:14px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;min-height:-webkit-fill-available}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:400px}
.auth-logo{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;margin-bottom:4px}
.auth-title{font-size:22px;font-weight:700;margin-bottom:24px}
.auth-tabs{display:flex;border:2px solid var(--border);border-radius:var(--r-sm);padding:3px;margin-bottom:18px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;border-radius:6px;color:var(--text2);transition:all .15s}
.auth-tab.on{background:var(--text);color:#fff}
.role-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.role-btn{padding:14px;border:2px solid var(--border);border-radius:var(--r);text-align:center;cursor:pointer;transition:all .15s}
.role-btn.on{border-color:var(--accent);background:var(--accent-light)}
.role-btn-icon{font-size:24px;margin-bottom:4px}
.role-btn-label{font-size:13px;font-weight:700;color:var(--text)}
.role-btn-sub{font-size:11px;color:var(--text2);margin-top:2px}
.err{background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:12px;display:none;border:1px solid #F7C1C1}
.err.show{display:block}
.academy-search{position:relative}
.academy-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-sm);z-index:50;max-height:200px;overflow-y:auto;display:none}
.academy-dropdown.show{display:block}
.academy-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border)}
.academy-item:last-child{border-bottom:none}
.academy-item:hover{background:var(--bg)}

/* ── LAYOUT ── */
.fg{margin-bottom:12px}
.fl{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}
input,textarea,select{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:var(--r-sm);font-size:15px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:72px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:var(--r-sm);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:2px solid var(--border);background:transparent;color:var(--text);transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-full{width:100%}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-danger{color:var(--red);border-color:var(--red-bg)}
.divider{height:2px;background:var(--border);margin:14px 0}

/* ── APP ── */
.app{display:none;flex-direction:column;height:100vh;height:-webkit-fill-available}
.app.on{display:flex}
.app-header{background:var(--surface);border-bottom:2px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:8px}
.header-title{font-size:16px;font-weight:700}
.header-sub{font-size:11px;color:var(--text2)}
.back-btn{display:none;align-items:center;gap:4px;font-size:14px;font-weight:700;color:var(--accent);cursor:pointer}
.back-btn.on{display:flex}
.tab-nav{background:var(--surface);border-bottom:2px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-item{flex:1;min-width:52px;padding:10px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab-item.on{color:var(--accent);border-bottom-color:var(--accent)}
.content{flex:1;overflow-y:auto;padding-bottom:80px}
.section{display:none;padding:16px}
.section.on{display:block}

/* ── CARDS ── */
.card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px}
.s-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.s-card:active{border-color:var(--accent)}
.s-row{display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:2px solid transparent}
.av0{background:#FDF0EA;color:#C43E05;border-color:#F5C4B3}
.av1{background:#EAF3FC;color:#0C4A8A;border-color:#B5D4F4}
.av2{background:#E8F7EE;color:#14632F;border-color:#9FE1CB}
.av3{background:#F3EFFE;color:#6B21A8;border-color:#C4B5FD}
.av4{background:#FFF4E0;color:#854D0E;border-color:#FED7AA}
.s-name{font-size:15px;font-weight:700}
.s-meta{font-size:12px;color:var(--text2);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-blue{background:var(--blue-bg);color:var(--blue-dark)}
.b-orange{background:var(--accent-light);color:var(--accent-dark)}
.b-gray{background:#F0EDE8;color:var(--text2)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.pending-tag{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--amber-bg);color:var(--amber);font-weight:700;border:1px solid #FED7AA}
.reenroll-tag{font-size:11px;padding:2px 6px;border-radius:10px;background:var(--amber-bg);color:var(--amber);font-weight:700}

/* ── PENDING SECTION ── */
.pending-section{background:var(--amber-bg);border:2px solid #FED7AA;border-radius:var(--r);padding:14px;margin-bottom:12px}
.pending-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pending-header-title{font-size:14px;font-weight:700;color:var(--amber)}
.pending-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #FED7AA}
.pending-item:last-child{border-bottom:none}
.pending-name{font-size:14px;font-weight:700}
.pending-email{font-size:12px;color:var(--text2)}
.approve-btn{padding:6px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.reject-btn{padding:6px 14px;background:transparent;color:var(--red);border:2px solid var(--red-bg);border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:6px}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:var(--bg);border-radius:var(--r-sm);padding:12px;border:2px solid var(--border)}
.stat-val{font-size:24px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px;font-weight:500}

/* ── CALENDAR ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.month-nav span{font-size:14px;font-weight:700}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-hdr span{text-align:center;font-size:10px;font-weight:700;color:var(--text2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2)}
.cal-day.att{background:var(--blue-bg);color:var(--blue-dark);border-color:var(--blue)}
.cal-day.abs{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.cal-day.today{outline:2.5px solid var(--text);outline-offset:-1px}
.cal-day.emp{pointer-events:none;opacity:0;border:none;background:none}
.att-sum{background:var(--bg);border-radius:var(--r-sm);padding:10px;font-size:13px;color:var(--text2);margin-top:8px;border:2px solid var(--border);font-weight:500}
.att-sum b{color:var(--text);font-weight:700}

/* ── PROGRESS ── */
.prog-row{margin-bottom:12px}
.prog-lrow{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-lbl{font-size:14px;font-weight:700}
.prog-val{font-size:14px;font-weight:700}
.prog-bar{height:10px;background:var(--bg);border-radius:20px;overflow:hidden;margin-bottom:5px;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:20px;transition:width .3s}
input[type=range]{width:100%;accent-color:var(--text)}

/* ── FEEDBACK ── */
.fb-item{padding:10px 0;border-bottom:2px solid var(--border)}
.fb-item:last-child{border-bottom:none}
.fb-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.fb-date{font-size:11px;color:var(--text3);font-weight:500}
.fb-text{font-size:13px;line-height:1.6}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.chip{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid var(--border);cursor:pointer;color:var(--text2);transition:all .1s}
.chip.on{background:var(--text);color:#fff;border-color:var(--text)}
.chip-dash{border-style:dashed}

/* ── HOMEWORK ── */
.hw-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:2px solid var(--border)}
.hw-row:last-child{border-bottom:none}
.hw-check{width:22px;height:22px;border-radius:6px;border:2.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .15s}
.hw-check.done{background:var(--green-bg);border-color:var(--green)}
.hw-title{font-size:14px;font-weight:500;line-height:1.4}
.hw-done-text{text-decoration:line-through;color:var(--text3)}
.hw-due{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.hw-tag{font-size:10px;font-weight:700;padding:2px 5px;border-radius:6px;margin-left:4px;vertical-align:middle}
.tag-p{background:var(--blue-bg);color:var(--blue-dark)}
.tag-c{background:var(--accent-light);color:var(--accent-dark)}

/* ── HOMEWORK FORM ── */
.seg{display:flex;background:var(--bg);border-radius:var(--r-sm);padding:3px;margin-bottom:10px;border:2px solid var(--border)}
.seg-btn{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:700;border-radius:6px;color:var(--text2);cursor:pointer;transition:all .15s}
.seg-btn.on{background:var(--surface);color:var(--text);border:1.5px solid var(--border2)}
.s-check-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1.5px solid var(--border)}
.s-check-row:last-child{border-bottom:none}
.s-chk{width:20px;height:20px;border-radius:5px;border:2.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.s-chk.on{background:var(--blue-bg);border-color:var(--blue)}

/* ── INFO TABLE ── */
.info-tbl{width:100%;font-size:13px;border-collapse:collapse}
.info-tbl td{padding:6px 0;vertical-align:top;border-bottom:1px solid var(--border)}
.info-tbl tr:last-child td{border-bottom:none}
.info-tbl td:first-child{color:var(--text2);width:80px;font-weight:700}
.info-tbl td:last-child{font-weight:500}

/* ── ROLE BANNER ── */
.role-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--r-sm);margin-bottom:12px;font-size:13px;font-weight:700;border:2px solid}
.t-banner{background:var(--accent-light);color:var(--accent-dark);border-color:#F5C4B3}
.s-banner{background:var(--blue-bg);color:var(--blue-dark);border-color:#B5D4F4}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.on{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}

/* ── TAB BADGE ── */
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 4px;background:var(--accent);color:#fff;border-radius:20px;font-size:10px;font-weight:700;margin-left:4px;line-height:1}
.tab-badge.green{background:var(--green)}
.tab-badge.amber{background:var(--amber)}

/* ── STUDENT SUB TABS ── */
.sub-tabs{display:flex;gap:8px;margin-bottom:12px}
.sub-tab{flex:1;padding:8px 12px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-sm);text-align:center;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.sub-tab.on{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.sub-tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 5px;border-radius:20px;font-size:11px;font-weight:700;background:var(--accent);color:#fff}
.sub-tab.on .sub-tab-count{background:var(--accent-dark)}
.sub-tab:not(.on) .sub-tab-count{background:var(--text2)}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:60;box-shadow:0 4px 16px rgba(232,80,10,.4)}
.fab.on{display:flex}

/* ── TOAST ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text2);font-size:14px;gap:10px;font-weight:500}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;line-height:1.9;font-weight:500}

/* ── STUDENT VIEW (pending) ── */
.pending-wait{text-align:center;padding:48px 20px}
.pending-wait-icon{font-size:48px;margin-bottom:16px}
.pending-wait-title{font-size:18px;font-weight:700;margin-bottom:8px}
.pending-wait-sub{font-size:14px;color:var(--text2);line-height:1.7}

@media(min-width:600px){
  .app,.auth-wrap{max-width:480px;margin:0 auto}
  .app{border-left:2px solid var(--border);border-right:2px solid var(--border)}
}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-wrap" id="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">학원 학생관리</div>
    <div class="auth-title" id="auth-title">로그인</div>
    <div class="auth-tabs">
      <div class="auth-tab on" onclick="setMode('login')">로그인</div>
      <div class="auth-tab" onclick="setMode('signup')">회원가입</div>
    </div>
    <div class="err" id="auth-err"></div>

    <!-- 회원가입 역할 선택 -->
    <div id="role-section" style="display:none">
      <div class="fl">역할 선택</div>
      <div class="role-select">
        <div class="role-btn on" id="role-owner" onclick="selectRole('owner')">
          <div class="role-btn-icon">🏫</div>
          <div class="role-btn-label">학원장</div>
          <div class="role-btn-sub">학원 등록 및<br>학생 관리</div>
        </div>
        <div class="role-btn" id="role-student" onclick="selectRole('student')">
          <div class="role-btn-icon">🎓</div>
          <div class="role-btn-label">학생</div>
          <div class="role-btn-sub">학원 검색 후<br>가입 신청</div>
        </div>
      </div>
    </div>

    <!-- 학원장: 학원명 입력 -->
    <div id="academy-name-section" style="display:none">
      <div class="fg"><label class="fl">학원 이름</label>
        <input type="text" id="academy-name" placeholder="예: 스피킹짐 강남점" autocomplete="off" lang="ko"></div>
    </div>

    <!-- 학생: 학원 검색 -->
    <div id="academy-search-section" style="display:none">
      <div class="fg"><label class="fl">학원 검색</label>
        <div class="academy-search">
          <input type="text" id="academy-search-input" placeholder="학원 이름 검색..." oninput="searchAcademies(this.value)" autocomplete="off" lang="ko">
          <div class="academy-dropdown" id="academy-dropdown"></div>
        </div>
        <input type="hidden" id="selected-academy-id">
        <div id="selected-academy-name" style="font-size:12px;color:var(--green);margin-top:4px;font-weight:700"></div>
      </div>
      <div class="fg"><label class="fl">이름 *</label><input type="text" id="s-name" placeholder="홍길동"></div>
      <div class="fg"><label class="fl">연락처</label><input type="tel" id="s-phone" placeholder="010-0000-0000"></div>
      <div class="fg"><label class="fl">레벨</label><select id="s-level"><option value="">선택</option><option>입문</option><option>초급</option><option>중급</option><option>중상급</option><option>고급</option></select></div>
      <div class="fg"><label class="fl">학습목표</label><input type="text" id="s-goal" placeholder="비즈니스, 여행, 일상회화 등"></div>
      <div class="fg"><label class="fl">특이사항</label><textarea id="s-notes" placeholder="알레르기, 선호도 등..."></textarea></div>
    </div>

    <div class="fg"><label class="fl">이메일</label>
      <input type="email" id="a-email" placeholder="이메일 입력"></div>
    <div class="fg"><label class="fl">비밀번호</label>
      <input type="password" id="a-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doAuth()"></div>
    <div class="fg" id="a-pw2-wrap" style="display:none"><label class="fl">비밀번호 확인</label>
      <input type="password" id="a-pw2" placeholder="재입력"></div>

      if(error){showErr(error.message);return}

      await sb.from('academies').insert({name:aName,owner_id:data.user.id});
      enterApp(data.user);
    } else {
      const aId=$('selected-academy-id').value;
      if(!aId){showErr('학원을 선택하세요');return}
      const {data,error}=await sb.auth.signUp({email,password:pw});
      if(error){showErr(error.message);return}
      const sName = $('s-name')?.value.trim()||'';
      const sPhone = $('s-phone')?.value.trim()||'';
      const sLevel = $('s-level')?.value||'';
      const sGoal = $('s-goal')?.value.trim()||'';
      const sNotes = $('s-notes')?.value.trim()||'';

  }
}

async function enterApp(u){
  user=u;
  $('auth-wrap').style.display='none';

  // 학원장인지 확인
  const {data:ownedAcademy}=await sb.from('academies').select('*').eq('owner_id',u.id).single();

  // 강사 체크
  const {data:instData}=await sb.from('instructors').select('*,academies(*)').eq('user_id',u.id).single();

  if(ownedAcademy){
    // 학원장
    academy=ownedAcademy;
    $('header-title').textContent=academy.name;
    $('header-sub').textContent=u.email;
    $('fab').classList.add('on');
    $('app').classList.add('on');
    // 학원장 탭 전체 표시
    $('tab-manage') && ($('tab-manage').style.display='');
    await loadMembers();
    updateMonthLabel();
    renderFbForm();renderHwForm();
  } else if(instData && instData.academies){
    // 강사
    academy=instData.academies;
    isInstructor=true;
    $('header-title').textContent=academy.name;
    $('header-sub').textContent=u.email+' (강사)';
    $('fab').classList.add('on');
    $('app').classList.add('on');
    // 강사는 반·강사 탭 숨기기
    $('tab-manage') && ($('tab-manage').style.display='none');
    // 담당 학생만 로드
    const {data:myMemberIds}=await sb.from('instructor_members').select('member_id').eq('instructor_id',instData.id);
    const ids=(myMemberIds||[]).map(x=>x.member_id);
    if(ids.length){

      members=data||[];
    } else members=[];
    populateSelects();renderStudents();renderFbForm();renderHwForm();updateMonthLabel();
  } else {
    // 학생 — 멤버십 확인
    const {data:membership}=await sb.from('academy_members').select('*,academies(name)').eq('user_id',u.id).single();

function renderStudents(){
  const q=($('search-input')?.value||'').toLowerCase();
  const pending=members.filter(m=>m.status==='pending');
  const approved=members.filter(m=>m.status==='approved');

  // 카운트 업데이트
  if($('count-approved'))$('count-approved').textContent=approved.length;
  if($('count-pending'))$('count-pending').textContent=pending.length;

  const list=$('student-list');

  if(studentSubTab==='pending'){
    if(!pending.length){list.innerHTML='<div class="empty-state">승인 대기 학생이 없어요</div>';return}
    list.innerHTML=pending.map(m=>`
      <div class="card" style="border-color:var(--amber)">
        <div class="s-row" style="margin-bottom:10px">
          <div class="avatar" style="background:var(--amber-bg);color:var(--amber);border-color:var(--amber)">${(m.name||'?').slice(0,2)}</div>
          <div style="flex:1">
            <div class="s-name">${m.name||'이름 미설정'}</div>
            <div class="s-meta">${m.email}</div>
            <div class="s-meta">${m.level||''} ${m.goal?'· '+m.goal:''}</div>
          </div>
          <span class="pending-tag">대기중</span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="approve-btn btn-full" style="flex:1;padding:9px" onclick="approveMember('${m.id}')">✓ 승인</button>
          <button class="reject-btn btn-full" style="flex:1;padding:9px" onclick="rejectMember('${m.id}')">✕ 거절</button>
        </div>
      </div>`).join('');
    return;
  }

  // 현재 학생
  const filtered=approved.filter(m=>
    (m.name||'').toLowerCase().includes(q)||(m.email||'').includes(q)||(m.level||'').includes(q)
  );
  if(!filtered.length){list.innerHTML='<div class="empty-state">학생이 없어요<br>+ 버튼으로 추가하거나<br>가입 승인을 해주세요</div>';return}
  list.innerHTML=filtered.map((m,i)=>{
    const att=m.attendance||[];
    const done=att.filter(a=>a.status==='attended').length;
    const rate=att.length?Math.round(done/att.length*100):null;
    const rb=rate!==null?`<span class="badge ${rate>=80?'b-green':rate>=60?'b-amber':'b-red'}">${rate}%</span>`:'';
    const rt=m.reenroll_date?`<span class="reenroll-tag">재등록 ${m.reenroll_date}</span>`:'';
    // 미완료 숙제
    const undoneHw=(m.homework||[]).filter(h=>!h.done).length;
    // 미답변 질문
    const unansweredQ=(m.questions||[]).filter(q=>!q.reply).length;
    const alerts=[];
    if(undoneHw>0)alerts.push(`<span class="badge b-amber" style="font-size:10px">숙제 ${undoneHw}</span>`);
    if(unansweredQ>0)alerts.push(`<span class="badge b-red" style="font-size:10px">질문 ${unansweredQ}</span>`);
    return`<div class="s-card" onclick="showDetail('${m.id}')"><div class="s-row">
      <div class="avatar ${avC(i)}">${(m.name||m.email||'?').slice(0,2)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="s-name">${m.name||m.email}</span>${rt}</div>
        <div class="s-meta">${m.level||'레벨 미설정'} · ${m.goal||'목표 미설정'}</div>
        ${alerts.length?`<div style="display:flex;gap:4px;margin-top:4px">${alerts.join('')}</div>`:''}
      </div>
      <div>${rb}</div>
    </div></div>`;
  }).join('');
  html+='';
  });
  list.innerHTML=html||'<div class="empty-state">학생이 없어요</div>';
}

function updateMonthLabel(){
  const m=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  $('month-lbl').textContent=`${calYear}년 ${m[calMonth]}`;
}
function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}updateMonthLabel();renderCalendar()}
function renderCalendar(){
  const sid=$('att-sel')?.value,grid=$('cal-grid'),sum=$('att-sum');
  if(!grid)return;if(!sid){grid.innerHTML='';sum.innerHTML='';return}
  const m=members.find(x=>x.id===sid);if(!m)return;
  const first=new Date(calYear,calMonth,1).getDay(),days=new Date(calYear,calMonth+1,0).getDate(),today=new Date();
  let html='';
  for(let i=0;i<first;i++)html+='<div class="cal-day emp"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec=(m.attendance||[]).find(a=>a.date===ds);
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    let cls='cal-day';
    if(rec?.status==='attended')cls+=' att';else if(rec?.status==='absent')cls+=' abs';
    if(isToday)cls+=' today';
    html+=`<div class="${cls}" onclick="toggleAtt('${sid}','${ds}')">${d}</div>`;
  }
  grid.innerHTML=html;
  const att=m.attendance||[],mn=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const mA=att.filter(a=>a.date.startsWith(mn));
  sum.innerHTML=`이번 달 출석 <b>${mA.filter(a=>a.status==='attended').length}회</b> / 결석 <b>${mA.filter(a=>a.status==='absent').length}회</b> · 전체 출석률 <b>${att.length?Math.round(att.filter(a=>a.status==='attended').length/att.length*100):0}%</b>`;
}

async function toggleAtt(sid,date){
  const m=members.find(x=>x.id===sid);if(!m)return;
  if(!m.attendance)m.attendance=[];
  const i=m.attendance.findIndex(a=>a.date===date);
  if(i===-1)m.attendance.push({date,status:'attended'});
  else if(m.attendance[i].status==='attended')m.attendance[i].status='absent';
  else m.attendance.splice(i,1);
  await sb.from('academy_members').update({attendance:m.attendance}).eq('id',sid);
  renderCalendar();updateAllBadges();
}

      <div style="flex:1"><div class="hw-title ${h.done?'hw-done-text':''}">${h.title}${tag}</div>${h.due?`<div class="hw-due">마감 ${h.due}${h.done?' · 완료':''}</div>`:''}</div>

async function addHwPersonal(){

async function addHwCommon(){
  if(!hwSel.size){toast('학생을 선택하세요');return}
  const title=$('hw-input')?.value.trim();if(!title){toast('내용을 입력하세요');return}

function renderMyAttendance(){
  const m=myMember;if(!m)return;
  const grid=$('s-cal-grid'),sum=$('s-att-sum');
  if(!grid)return;
  const first=new Date(sCalYear,sCalMonth,1).getDay(),days=new Date(sCalYear,sCalMonth+1,0).getDate(),today=new Date();
  let html='';
  for(let i=0;i<first;i++)html+='<div class="cal-day emp"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${sCalYear}-${String(sCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec=(m.attendance||[]).find(a=>a.date===ds);
    const isToday=today.getFullYear()===sCalYear&&today.getMonth()===sCalMonth&&today.getDate()===d;
    let cls='cal-day';
    if(rec?.status==='attended')cls+=' att';else if(rec?.status==='absent')cls+=' abs';
    if(isToday)cls+=' today';
    html+=`<div class="${cls}">${d}</div>`;
  }
  grid.innerHTML=html;
  const att=m.attendance||[],mn=`${sCalYear}-${String(sCalMonth+1).padStart(2,'0')}`;
  const mA=att.filter(a=>a.date.startsWith(mn));
  sum.innerHTML=`이번 달 출석 <b>${mA.filter(a=>a.status==='attended').length}회</b> / 결석 <b>${mA.filter(a=>a.status==='absent').length}회</b>`;
}

// ── BADGE SYSTEM ─────────────────────────────────────────────
function updateAllBadges(){
  const today=new Date().toISOString().split('T')[0];
  const approved=members.filter(m=>m.status==='approved');
  const pending=members.filter(m=>m.status==='pending');

  // 학생목록 - 승인대기 뱃지
  const pendingCount=pending.length;
  updateTabBadge('tab-students', pendingCount>0?pendingCount:0, 'accent');

  // 출석 - 오늘 미체크 학생 수
  const unchecked=approved.filter(m=>{
    const att=m.attendance||[];
    return !att.find(a=>a.date===today);
  }).length;
  updateTabBadge('tab-attendance', unchecked, 'amber');

  // 숙제 - 미완료 숙제 있는 학생 수
  const hwAlert=approved.filter(m=>(m.homework||[]).some(h=>!h.done)).length;
  updateTabBadge('tab-homework', hwAlert, 'amber');

  // 질문 - 미답변 질문 총합
  const unanswered=approved.reduce((sum,m)=>sum+(m.questions||[]).filter(q=>!q.reply).length,0);
  updateTabBadge('tab-questions', unanswered, 'accent');

  // 피드백 - 이번 주 피드백 없는 학생 수
  const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
  const noFb=approved.filter(m=>{
    const fb=m.feedback||[];
    if(!fb.length)return true;
    const last=new Date(fb[fb.length-1].date.replace(/\./g,'-'));
    return last<weekAgo;
  }).length;
  updateTabBadge('tab-record', noFb, 'amber');

  // 카운트 업데이트
  if($('count-approved'))$('count-approved').textContent=approved.length;
  if($('count-pending'))$('count-pending').textContent=pendingCount;
}

function updateTabBadge(tabId, count, type){
  const el=$(tabId);
  if(!el)return;
  const existing=el.querySelector('.tab-badge');
  if(existing)existing.remove();
  if(count>0){
    const badge=document.createElement('span');
    badge.className='tab-badge'+(type==='amber'?' amber':'');
    badge.textContent=count>99?'99+':count;
    el.appendChild(badge);
  }
}

  if(!confirm('강사를 삭제할까요?'))return;
  await sb.from('instructors').delete().eq('id',id);
  instructors=instructors.filter(x=>x.id!==id);
  instructorMemberships=instructorMemberships.filter(x=>x.instructor_id!==id);
  renderInstructorManage();toast('삭제됐어요');
}

function openAssignInstructor(instId){
  const inst=instructors.find(x=>x.id===instId);
  const currentIds=instructorMemberships.filter(im=>im.instructor_id===instId).map(im=>im.member_id);
  const approved=members.filter(m=>m.status==='approved');
  $('modal-title').textContent=`${inst?.name||'강사'} 담당 학생`;
  $('modal-body').innerHTML=`
    <div style="margin-bottom:12px;font-size:13px;color:var(--text2)">담당할 학생을 선택하세요</div>
    ${approved.map(m=>`<div class="s-check-row">
      <div class="s-chk ${currentIds.includes(m.id)?'on':''}" id="inst-chk-${m.id}" onclick="toggleInstChk('${m.id}')">
        ${currentIds.includes(m.id)?`<svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="#1A6EBF" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:''}
      </div>
      <div style="font-size:14px;font-weight:700">${m.name||m.email}</div>
    </div>`).join('')||'<div class="empty-state">학생이 없어요</div>'}
    <button class="btn btn-primary btn-full" style="margin-top:12px" onclick="saveInstAssign('${instId}')">저장</button>`;
  $('modal').classList.add('on');
}

function toggleInstChk(memberId){
  const el=$('inst-chk-'+memberId);if(!el)return;
  const isOn=el.classList.toggle('on');
  el.innerHTML=isOn?`<svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="#1A6EBF" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:'';
}

async function saveInstAssign(instId){
  const approved=members.filter(m=>m.status==='approved');
  const selectedIds=approved.filter(m=>$('inst-chk-'+m.id)?.classList.contains('on')).map(m=>m.id);
  await sb.from('instructor_members').delete().eq('instructor_id',instId);
  instructorMemberships=instructorMemberships.filter(x=>x.instructor_id!==instId);
  if(selectedIds.length){
    const inserts=selectedIds.map(member_id=>({instructor_id:instId,member_id}));
    const {data}=await sb.from('instructor_members').insert(inserts).select();
    if(data)instructorMemberships=[...instructorMemberships,...data];
  }
  closeModal();renderInstructorManage();toast('담당 학생이 저장됐어요');
}

// ── QUESTIONS ─────────────────────────────────────────────────
function renderQuestions(){
  const sid=$('q-sel')?.value;
  const el=$('q-list');
  const replyEl=$('q-teacher-reply');
  if(!el)return;
  if(!sid){el.innerHTML='<div class="empty-state">학생을 선택하세요</div>';if(replyEl)replyEl.innerHTML='';return}
  const m=members.find(x=>x.id===sid);
  const qs=[...(m?.questions||[])].reverse();
  if(!qs.length){el.innerHTML='<div class="empty-state">질문이 없어요</div>'}
  else{
    el.innerHTML='<div class="card">'+qs.map((q,ri)=>{
      const i=(m.questions.length-1-ri);
      return`<div class="fb-item">
        <div class="fb-meta">
          <span class="badge b-blue">질문</span>
          <span class="fb-date">${q.date}</span>
        </div>
        <div class="fb-text">${q.text}</div>
        ${q.reply?`<div style="margin-top:8px;padding:8px;background:var(--accent-light);border-radius:var(--r-sm);font-size:13px;color:var(--accent-dark)">💬 ${q.reply}<br><span style="font-size:11px;color:var(--text3)">${q.replyDate||''}</span></div>`
        :`<div style="margin-top:6px"><input type="text" id="reply-input-${i}" placeholder="답변 입력..." style="margin-bottom:6px">
          <button class="btn btn-sm btn-primary" onclick="replyQuestion('${sid}',${i})">답변하기</button></div>`}
      </div>`;
    }).join('')+'</div>';
  }
  if(replyEl)replyEl.innerHTML='';
}

async function replyQuestion(sid,i){
  const m=members.find(x=>x.id===sid);if(!m)return;
  const reply=document.getElementById('reply-input-'+i)?.value.trim();
  if(!reply){toast('답변을 입력하세요');return}
  m.questions[i].reply=reply;
  m.questions[i].replyDate=new Date().toLocaleDateString('ko-KR');
  await sb.from('academy_members').update({questions:m.questions}).eq('id',sid);
  renderQuestions();updateAllBadges();toast('답변을 보냈어요!');
}

function renderMyQuestions(){
  const m=myMember;if(!m)return;
  const qs=[...(m.questions||[])].reverse();
  const el=$('my-q-list');
  if(!el)return;
  if(!qs.length){el.innerHTML='<div class="empty-state">아직 질문이 없어요</div>';return}
  el.innerHTML='<div class="card">'+qs.map(q=>`
    <div class="fb-item">
      <div class="fb-meta"><span class="badge b-blue">내 질문</span><span class="fb-date">${q.date}</span></div>
      <div class="fb-text">${q.text}</div>
      ${q.reply?`<div style="margin-top:8px;padding:8px;background:var(--accent-light);border-radius:var(--r-sm);font-size:13px;color:var(--accent-dark)">💬 선생님 답변: ${q.reply}<br><span style="font-size:11px;color:var(--text3)">${q.replyDate||''}</span></div>`
      :`<div style="margin-top:4px;font-size:12px;color:var(--amber)">⏳ 답변 대기 중</div>`}
    </div>`).join('')+'</div>';
}

async function submitQuestion(){
  if(!myMember){toast('로그인 필요');return}
  const text=$('my-q-text')?.value.trim();
  if(!text){toast('질문을 입력하세요');return}
  if(!myMember.questions)myMember.questions=[];
  myMember.questions.push({date:new Date().toLocaleDateString('ko-KR'),text,reply:null});
  $('my-q-text').value='';
  await sb.from('academy_members').update({questions:myMember.questions}).eq('id',myMember.id);
  renderMyQuestions();updateAllBadges();toast('질문을 보냈어요!');
}

// ── INIT ─────────────────────────────────────────────────────
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user)enterApp(session.user);
})();
</script>
