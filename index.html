<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="학원관리">
<meta name="theme-color" content="#E8500A">
<link rel="manifest" href="manifest.json">
<title>학원 학생관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --bg:#F0EDE8;--sf:#FFF;--bd:#DDD9D2;--bd2:#C8C4BC;
  --tx:#1C1A17;--tx2:#5C5750;--tx3:#9C9890;
  --ac:#E8500A;--acl:#FDF0EA;--acd:#C43E05;
  --bl:#1A6EBF;--blb:#EAF3FC;--bld:#0C4A8A;
  --gr:#1A8A4A;--grb:#E8F7EE;
  --am:#B86A00;--amb:#FFF4E0;
  --rd:#CC2222;--rdb:#FDEAEA;
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;min-height:100vh;min-height:-webkit-fill-available}

/* ── LAYOUT ── */
.screen{display:none;flex-direction:column;height:100vh;height:-webkit-fill-available;max-width:480px;margin:0 auto}
.screen.on{display:flex}
.hd{background:var(--sf);border-bottom:2px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hd-l{display:flex;align-items:center;gap:8px}
.hd-title{font-size:16px;font-weight:700}
.hd-sub{font-size:11px;color:var(--tx2)}
.back{display:none;align-items:center;gap:4px;font-size:14px;font-weight:700;color:var(--ac);cursor:pointer;padding:4px 0;white-space:nowrap}
.back.on{display:flex}
.content{flex:1;overflow-y:auto;padding-bottom:70px}
.page{display:none;padding:16px}
.page.on{display:block}
.page.np{padding:0}
.page.np.on{display:block}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--sf);border-top:2px solid var(--bd);display:flex;z-index:80}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;cursor:pointer;color:var(--tx2);position:relative;font-size:10px;font-weight:700;gap:2px}
.bni.on{color:var(--ac)}
.bni-icon{font-size:20px;line-height:1}
.bni-bdg{position:absolute;top:5px;right:calc(50% - 18px);background:var(--ac);color:#fff;border-radius:20px;font-size:10px;font-weight:700;min-width:16px;height:16px;padding:0 4px;display:none;align-items:center;justify-content:center}
.bni-bdg.on{display:flex}

/* ── TAB NAV ── */
.tnav{background:var(--sf);border-bottom:2px solid var(--bd);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tnav::-webkit-scrollbar{display:none}
.tni{flex:1;min-width:52px;padding:10px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tni.on{color:var(--ac);border-bottom-color:var(--ac)}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;max-width:480px;margin:0 auto}
.auth-card{background:var(--sf);border:2px solid var(--bd);border-radius:20px;padding:32px 24px;width:100%}
.auth-logo{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--ac);text-transform:uppercase;margin-bottom:4px}
.auth-title{font-size:22px;font-weight:700;margin-bottom:24px}
.auth-tabs{display:flex;border:2px solid var(--bd);border-radius:var(--rs);padding:3px;margin-bottom:18px}
.atab{flex:1;padding:8px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;border-radius:6px;color:var(--tx2)}
.atab.on{background:var(--tx);color:#fff}
.role-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.role-btn{padding:14px;border:2px solid var(--bd);border-radius:var(--r);text-align:center;cursor:pointer}
.role-btn.on{border-color:var(--ac);background:var(--acl)}
.role-icon{font-size:22px;margin-bottom:4px}
.role-lbl{font-size:13px;font-weight:700}
.role-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.err{background:var(--rdb);color:var(--rd);padding:10px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:12px;display:none;border:1px solid #F7C1C1}
.err.on{display:block}
.adrop{position:absolute;top:100%;left:0;right:0;background:var(--sf);border:2px solid var(--bd);border-radius:var(--rs);z-index:50;max-height:180px;overflow-y:auto;display:none}
.adrop.on{display:block}
.adrop-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--bd)}
.adrop-item:hover{background:var(--bg)}

/* ── FORM ── */
.fg{margin-bottom:12px}
.fl{font-size:13px;font-weight:700;color:var(--tx2);margin-bottom:5px;display:block}
input,textarea,select{width:100%;padding:11px 14px;border:2px solid var(--bd);border-radius:var(--rs);font-size:15px;font-family:inherit;color:var(--tx);background:var(--sf);outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--ac)}
textarea{resize:vertical;min-height:72px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:var(--rs);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:2px solid var(--bd);background:transparent;color:var(--tx);transition:all .15s}
.btn:active{transform:scale(.97)}
.btp{background:var(--ac);color:#fff;border-color:var(--ac)}
.btf{width:100%}
.bts{padding:7px 12px;font-size:13px}
.btd{color:var(--rd);border-color:var(--rdb)}
.divider{height:2px;background:var(--bd);margin:14px 0}
.seg{display:flex;background:var(--bg);border-radius:var(--rs);padding:3px;margin-bottom:12px;border:2px solid var(--bd)}
.seg-b{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:700;border-radius:6px;color:var(--tx2);cursor:pointer}
.seg-b.on{background:var(--sf);color:var(--tx);border:1.5px solid var(--bd2)}

/* ── CARDS ── */
.card{background:var(--sf);border:2px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}

/* ── CLASS CARDS ── */
.cls-card{background:var(--sf);border:2px solid var(--bd);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.cls-card:active{border-color:var(--ac);transform:scale(.98)}
.cls-icon{width:50px;height:50px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.cls-name{font-size:15px;font-weight:700}
.cls-cnt{font-size:12px;color:var(--tx2);margin-top:2px}
.cls-hd{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--sf);border-bottom:2px solid var(--bd);position:sticky;top:0;z-index:10}

/* ── STUDENT CARDS ── */
.sc{background:var(--sf);border:2px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.sc:active{border-color:var(--ac)}
.sr{display:flex;align-items:center;gap:12px}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:2px solid transparent}
.av0{background:#FDF0EA;color:#C43E05;border-color:#F5C4B3}
.av1{background:#EAF3FC;color:#0C4A8A;border-color:#B5D4F4}
.av2{background:#E8F7EE;color:#14632F;border-color:#9FE1CB}
.av3{background:#F3EFFE;color:#6B21A8;border-color:#C4B5FD}
.av4{background:#FFF4E0;color:#854D0E;border-color:#FED7AA}
.sn{font-size:15px;font-weight:700}
.sm{font-size:12px;color:var(--tx2);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.bgr{background:var(--grb);color:var(--gr)}
.bam{background:var(--amb);color:var(--am)}
.brd{background:var(--rdb);color:var(--rd)}
.bbl{background:var(--blb);color:var(--bld)}
.bor{background:var(--acl);color:var(--acd)}
.bgr2{background:#F0EDE8;color:var(--tx2)}
.bpu{background:#F3EFFE;color:#6B21A8}

/* ── DETAIL ── */
.stat4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.stat{background:var(--bg);border-radius:var(--rs);padding:10px 6px;text-align:center;border:2px solid var(--bd)}
.sv{font-size:18px;font-weight:700}
.sl{font-size:10px;color:var(--tx2);margin-top:2px;font-weight:500}
.info-t{width:100%;font-size:13px;border-collapse:collapse}
.info-t td{padding:6px 0;vertical-align:top;border-bottom:1px solid var(--bd)}
.info-t tr:last-child td{border-bottom:none}
.info-t td:first-child{color:var(--tx2);width:72px;font-weight:700}

/* ── CALENDAR ── */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mnav span{font-size:14px;font-weight:700}
.chdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.chdr span{text-align:center;font-size:10px;font-weight:700;color:var(--tx2)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cd{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx2)}
.cd.click{cursor:pointer}
.cd.att{background:var(--blb);color:var(--bld);border-color:var(--bl)}
.cd.abs{background:var(--rdb);color:var(--rd);border-color:var(--rd)}
.cd.td{outline:2.5px solid var(--tx);outline-offset:-1px}
.cd.emp{pointer-events:none;opacity:0;border:none;background:none}
.att-s{font-size:13px;color:var(--tx2);margin-top:8px;font-weight:500}
.att-s b{color:var(--tx);font-weight:700}

/* ── PROGRESS ── */
.pr{margin-bottom:12px}
.pr-row{display:flex;justify-content:space-between;margin-bottom:4px}
.pr-bar{height:10px;background:var(--bg);border-radius:20px;overflow:hidden;margin-bottom:5px;border:1px solid var(--bd)}
.pr-fill{height:100%;border-radius:20px;transition:width .3s}
input[type=range]{width:100%;accent-color:var(--tx)}

/* ── ITEMS (feedback/questions) ── */
.irow{padding:11px 0;border-bottom:2px solid var(--bd)}
.irow:last-child{border-bottom:none}
.imeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.idate{font-size:11px;color:var(--tx3);font-weight:500}
.itxt{font-size:13px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.chip{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid var(--bd);cursor:pointer;color:var(--tx2)}
.chip.on{background:var(--tx);color:#fff;border-color:var(--tx)}
.chip.dash{border-style:dashed}
.qrep{margin-top:7px;padding:8px 10px;background:var(--acl);border-radius:var(--rs);font-size:12px;color:var(--acd);line-height:1.5}
.qpend{margin-top:4px;font-size:11px;color:var(--am);font-weight:700}

/* ── HOMEWORK ── */
.hwrow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:2px solid var(--bd)}
.hwrow:last-child{border-bottom:none}
.hwchk{width:22px;height:22px;border-radius:6px;border:2.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px}
.hwchk.done{background:var(--grb);border-color:var(--gr)}
.hwchk.over{background:var(--rdb);border-color:var(--rd);cursor:not-allowed}
.hwtitle{font-size:14px;font-weight:500;line-height:1.4}
.hwdone{text-decoration:line-through;color:var(--tx3)}
.hwdue{font-size:11px;color:var(--tx3);margin-top:2px;font-weight:500}
.hwtag{font-size:10px;font-weight:700;padding:2px 5px;border-radius:6px;margin-left:4px;vertical-align:middle}
.tagp{background:var(--blb);color:var(--bld)}
.tagc{background:var(--acl);color:var(--acd)}

/* ── ALERTS ── */
.al-item{background:var(--sf);border:2px solid var(--bd);border-radius:var(--r);padding:13px 16px;margin-bottom:8px;cursor:pointer}
.al-item.new{border-color:var(--ac);background:var(--acl)}
.al-txt{font-size:13px;font-weight:500;line-height:1.5}
.al-sub{font-size:12px;color:var(--tx2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.al-time{font-size:11px;color:var(--tx3);margin-top:3px}

/* ── PENDING ── */
.pend-card{background:var(--sf);border:2px solid var(--am);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.apbtn{padding:8px 14px;background:var(--gr);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.rjbtn{padding:8px 14px;background:transparent;color:var(--rd);border:2px solid var(--rdb);border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:6px}

/* ── HW STATUS ── */
.hw-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.hw-done-box{background:var(--grb);border:2px solid #9FE1CB;border-radius:var(--rs);padding:12px}
.hw-undone-box{background:var(--rdb);border:2px solid #F7C1C1;border-radius:var(--rs);padding:12px}
.hw-person{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.hw-person:last-child{border-bottom:none}
.hw-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* ── SETTINGS ── */
.set-g{margin-bottom:20px}
.set-lbl{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding:0 4px}
.set-item{background:var(--sf);border:2px solid var(--bd);border-radius:var(--r);padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.set-title{font-size:14px;font-weight:700}
.set-sub{font-size:12px;color:var(--tx2);margin-top:2px}

/* ── STUDENT WAITING ── */
.wait-box{text-align:center;padding:40px 20px}
.wait-icon{font-size:48px;margin-bottom:16px}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto}
.modal-ov.on{display:flex}
.modal{background:var(--sf);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-height:92vh;overflow-y:auto}
.modal-hd{width:36px;height:4px;border-radius:2px;background:var(--bd2);margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}

/* ── FAB ── */
.fab{position:fixed;bottom:78px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--ac);color:#fff;border:none;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:70;box-shadow:0 4px 16px rgba(232,80,10,.4)}
.fab.on{display:flex}

/* ── MISC ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:480px}
.toast.on{opacity:1}
.spin{width:20px;height:20px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--tx2);font-size:14px;line-height:2;font-weight:500}
.more-btn{width:100%;padding:9px;background:var(--bg);border:2px solid var(--bd);border-radius:var(--rs);font-size:13px;font-weight:700;color:var(--ac);cursor:pointer;margin-top:8px;font-family:inherit}
.schk-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1.5px solid var(--bd)}
.schk-row:last-child{border-bottom:none}
.schk{width:20px;height:20px;border-radius:5px;border:2.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.schk.on{background:var(--blb);border-color:var(--bl)}
.banner{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rs);margin-bottom:12px;font-size:13px;font-weight:700;border:2px solid}
.bn-s{background:var(--blb);color:var(--bld);border-color:#B5D4F4}
.bn-n{background:var(--acl);color:var(--acd);border-color:#F5C4B3}
</style>
</head>
<body>

<!-- ── AUTH ── -->
<div class="auth-wrap" id="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">학원 학생관리</div>
    <div class="auth-title" id="auth-title">로그인</div>
    <div class="auth-tabs">
      <div class="atab on" onclick="setAM('login')">로그인</div>
      <div class="atab" onclick="setAM('signup')">회원가입</div>
    </div>
    <div class="err" id="auth-err"></div>
    <div id="role-sec" style="display:none">
      <div class="fl" style="margin-bottom:8px">역할 선택</div>
      <div class="role-pick">
        <div class="role-btn on" id="rb-owner" onclick="setRole('owner')">
          <div class="role-icon">🏫</div><div class="role-lbl">학원장</div><div class="role-sub">학원 등록·관리</div>
        </div>
        <div class="role-btn" id="rb-student" onclick="setRole('student')">
          <div class="role-icon">🎓</div><div class="role-lbl">학생</div><div class="role-sub">학원 검색·가입</div>
        </div>
      </div>
    </div>
    <div id="owner-sec" style="display:none">
      <div class="fg"><label class="fl">학원 이름</label><input type="text" id="acad-name" placeholder="예: 스피킹짐 강남점"></div>
    </div>
    <div id="student-sec" style="display:none">
      <div class="fg"><label class="fl">학원 검색</label>
        <div style="position:relative">
          <input type="text" id="acad-search" placeholder="학원 이름 검색..." oninput="searchAcad(this.value)">
          <div class="adrop" id="adrop"></div>
        </div>
        <input type="hidden" id="acad-id">
        <div id="acad-sel-name" style="font-size:12px;color:var(--gr);margin-top:4px;font-weight:700"></div>
      </div>
      <div class="fg"><label class="fl">이름 *</label><input type="text" id="s-name" placeholder="홍길동"></div>
      <div class="fg"><label class="fl">연락처</label><input type="tel" id="s-phone" placeholder="010-0000-0000"></div>
      <div class="row2">
        <div class="fg"><label class="fl">레벨</label>
          <select id="s-level"><option value="">선택</option><option>입문</option><option>초급</option><option>중급</option><option>중상급</option><option>고급</option></select>
        </div>
        <div class="fg"><label class="fl">목표</label><input type="text" id="s-goal" placeholder="비즈니스 등"></div>
      </div>
    </div>
    <div class="fg"><label class="fl">이메일</label><input type="email" id="a-email" placeholder="이메일 입력"></div>
    <div class="fg"><label class="fl">비밀번호</label><input type="password" id="a-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doAuth()"></div>
    <div class="fg" id="pw2-wrap" style="display:none"><label class="fl">비밀번호 확인</label><input type="password" id="a-pw2" placeholder="재입력"></div>
    <button class="btn btp btf" id="a-btn" onclick="doAuth()">로그인</button>
  </div>

// ── CLASS CARDS ────────────────────────────────────────────────
function renderClasses(){
  const q=($('search-inp')?.value||'').toLowerCase();
  const approved=members.filter(m=>m.status==='approved');
  const pending=members.filter(m=>m.status==='pending');
  const el=$('classes-list');

  // 승인대기 섹션
  let html='';
  if(pending.length){
    html+=`<div style="background:var(--amb);border:2px solid #FED7AA;border-radius:var(--r);padding:12px 14px;margin-bottom:12px;cursor:pointer" onclick="switchPage('alerts')">
      <div style="font-size:13px;font-weight:700;color:var(--am)">🔔 가입 승인 대기 ${pending.length}명</div>
      <div style="font-size:12px;color:var(--am);margin-top:2px">${pending.map(m=>m.name||m.email).join(', ')}</div>
    </div>`;
  }

  // 반별 그룹핑
  const grouped={};
  approved.forEach(m=>{
    const mCls=clsMems.filter(cm=>cm.member_id===m.id).map(cm=>classes.find(c=>c.id===cm.class_id)?.name).filter(Boolean);
    if(!mCls.length){if(!grouped['미배정'])grouped['미배정']=[];grouped['미배정'].push(m)}
    else mCls.forEach(cn=>{if(!grouped[cn])grouped[cn]=[];grouped[cn].push(m)});
  });

  if(!approved.length&&!pending.length){el.innerHTML='<div class="empty">학생이 없어요<br>+ 버튼으로 추가하거나<br>알림에서 가입 승인을 해주세요</div>';return}

  const order=[...classes.map(c=>c.name),'미배정'];
  order.forEach((cn,i)=>{
    if(!grouped[cn]?.length)return;
    const g=grouped[cn];
    const filtered=q?g.filter(m=>(m.name||'').toLowerCase().includes(q)||(m.email||'').includes(q)):g;
    if(!filtered.length)return;
    const col=CLS_COLORS[i%CLS_COLORS.length];
    const emoji=CLS_EMOJI[i%CLS_EMOJI.length];
    const undone=g.reduce((s,m)=>s+(m.homework||[]).filter(h=>!h.done).length,0);
    const unanswered=g.reduce((s,m)=>s+(m.questions||[]).filter(q=>!q.reply).length,0);
    const alerts=[];
    if(undone>0)alerts.push(`<span class="badge bam" style="font-size:10px">숙제 ${undone}</span>`);
    if(unanswered>0)alerts.push(`<span class="badge brd" style="font-size:10px">질문 ${unanswered}</span>`);
    html+=`<div class="cls-card" onclick="openClassInner('${cn}')">
      <div class="cls-icon" style="background:${col.bg}"><span style="color:${col.ic}">${emoji}</span></div>
      <div style="flex:1;min-width:0">
        <div class="cls-name">${cn}</div>
        <div class="cls-cnt">${filtered.length}명</div>
        ${alerts.length?`<div style="display:flex;gap:4px;margin-top:5px">${alerts.join('')}</div>`:''}
      </div>
      <div style="font-size:20px;color:var(--tx3)">›</div>
    </div>`;
  });
  el.innerHTML=html;
}

function openClassInner(className){
  currentClass=className;
  document.querySelectorAll('#app .page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bni').forEach(n=>n.classList.remove('on'));
  $('pg-class-inner').classList.add('on');
  $('back-btn').style.display='flex';
  $('app-title').textContent=className;
  $('fab').style.display='';
  $('class-search').value='';
  renderClassInner(className,'');
}

function renderClassInner(className,q){
  const approved=members.filter(m=>m.status==='approved');
  const list=approved.filter(m=>{
    const mCls=clsMems.filter(cm=>cm.member_id===m.id).map(cm=>classes.find(c=>c.id===cm.class_id)?.name).filter(Boolean);
    const inCls=className==='미배정'?!mCls.length:mCls.includes(className);
    if(!inCls)return false;
    if(!q)return true;
    return (m.name||'').toLowerCase().includes(q)||(m.email||'').includes(q);
  });
  $('class-inner-cnt').textContent=list.length+'명';
  $('class-inner-list').innerHTML=list.length?list.map((m,i)=>makeSCard(m,i)).join(''):'<div class="empty">검색 결과가 없어요</div>';
}

function makeSCard(m,i){
  const att=m.attendance||[];
  const done=att.filter(a=>a.status==='attended').length;
  const rate=att.length?Math.round(done/att.length*100):null;
  const rb=rate!==null?`<span class="badge ${rate>=80?'bgr':rate>=60?'bam':'brd'}">${rate}%</span>`:'';
  const undone=(m.homework||[]).filter(h=>!h.done).length;
  const unanswered=(m.questions||[]).filter(q=>!q.reply).length;
  const alerts=[];
  if(undone>0)alerts.push(`<span class="badge bam" style="font-size:10px">숙제 ${undone}</span>`);
  if(unanswered>0)alerts.push(`<span class="badge brd" style="font-size:10px">질문 ${unanswered}</span>`);
  return`<div class="sc" onclick="openDetail('${m.id}')"><div class="sr">
    <div class="av ${avC(i)}">${(m.name||'?').slice(0,2)}</div>
    <div style="flex:1;min-width:0">
      <div class="sn">${m.name||m.email}</div>
      <div class="sm">${m.level||'레벨 미설정'} · ${m.goal||'목표 미설정'}</div>
      ${alerts.length?`<div style="display:flex;gap:4px;margin-top:4px">${alerts.join('')}</div>`:''}
    </div>
    <div>${rb}</div>
  </div></div>`;
}

function renderDetail(m){
  const att=m.attendance||[];
  const attDone=att.filter(a=>a.status==='attended').length;
  const rate=att.length?Math.round(attDone/att.length*100):0;
  const hw=m.homework||[];
  const prog=m.progress||{};
  const mCls=clsMems.filter(cm=>cm.member_id===m.id).map(cm=>classes.find(c=>c.id===cm.class_id)?.name).filter(Boolean);
  const mn=`${calY}-${String(calM+1).padStart(2,'0')}`;
  const mAtt=att.filter(a=>a.date.startsWith(mn));
  const MS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  function buildCal(){
    const first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate(),ts=todayStr();
    let h='';
    for(let i=0;i<first;i++)h+='<div class="cd emp"></div>';
    for(let d=1;d<=days;d++){
      const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const rec=att.find(a=>a.date===ds);
      let cls='cd click';
      if(rec?.status==='attended')cls+=' att';else if(rec?.status==='absent')cls+=' abs';
      if(ds===ts)cls+=' td';
      h+=`<div class="${cls}" onclick="toggleAtt('${m.id}','${ds}')">${d}</div>`;
    }
    return h;
  }

  $('pg-detail').innerHTML=`<div style="padding:16px">

    <!-- 요약 -->
    <div class="stat4">
      <div class="stat"><div class="sv">${attDone}</div><div class="sl">전체출석</div></div>

      <div class="card-title">진행도</div>

        <div class="pr-row"><span style="font-size:14px;font-weight:700">${l}</span><span style="font-size:14px;font-weight:700;color:${c}" id="pv-${k}">${prog[k]||0}%</span></div>
        <div class="pr-bar"><div class="pr-fill" id="pf-${k}" style="width:${prog[k]||0}%;background:${c}"></div></div>
        <input type="range" min="0" max="100" value="${prog[k]||0}" step="5" oninput="updProg('${m.id}','${k}',this.value)">

      <div style="margin-top:8px"><label class="fl">메모</label>
        <textarea id="prog-memo" placeholder="레벨 메모...">${m.notes||''}</textarea>
        <button class="btn bts btf" style="margin-top:6px" onclick="saveMemo('${m.id}')">메모 저장</button>
      </div>
    </div>

    <div class="card">
      <div class="sec-hd">
        <div class="card-title" style="margin:0">피드백</div>
        ${(m.feedback||[]).length?`<span style="font-size:12px;color:var(--tx2);font-weight:700">총 ${(m.feedback||[]).length}개</span>`:''}
      </div>
      ${[...(m.feedback||[])].reverse().map(f=>`<div class="irow">
        <div class="imeta"><span class="badge ${CAT_CLS[f.category?.split(',')[0]?.trim()]||'bgr2'}">${f.category||'기타'}</span><span class="idate">${f.date}</span></div>
        <div class="itxt">${f.text}</div>
      </div>`).join('')||'<div style="font-size:13px;color:var(--tx2);padding:4px 0">피드백이 없어요</div>'}
      <div class="divider"></div>
      <div class="fg"><label class="fl">카테고리 (복수선택)</label>
        <div class="chips" id="fb-chips">${FB_CATS.map((c,i)=>`<div class="chip${c==='기타'?' dash':''}${i===0?' on':''}" onclick="this.classList.toggle('on')">${c}</div>`).join('')}</div>
      </div>
      <div class="fg"><textarea id="fb-text" placeholder="피드백 내용..."></textarea></div>
      <button class="btn btp btf" onclick="addFb('${m.id}')">피드백 저장</button>

      <div class="sec-hd">

      </div>
      <div id="hw-list-${m.id}">
        ${hw.length?[...hw].reverse().map((h,ri)=>{
          const i=hw.length-1-ri;
          const over=!h.done&&h.due&&new Date(h.due)<new Date();
          return`<div class="hwrow" style="${over?'opacity:.65':''}">
            <div class="hwchk ${h.done?'done':over?'over':''}" onclick="${over?`toast('마감일이 지난 숙제예요')`:`toggleHW('${m.id}',${i})`}">
              ${h.done?`<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#1A8A4A" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:over?'<span style="font-size:9px;color:var(--rd)">✕</span>':''}
            </div>

              <div class="hwtitle ${h.done?'hwdone':''}">${h.title}<span class="hwtag ${h.type==='common'?'tagc':'tagp'}">${h.type==='common'?'공통':'개별'}</span></div>
              ${h.due?`<div class="hwdue" style="${over?'color:var(--rd);font-weight:700':''}">${over?'⚠️ 마감 지남 ':'마감 '}${h.due}${h.done?' · 완료':''}</div>`:''}

      </div>
      ${[...(m.questions||[])].reverse().map((q,ri)=>{
        const i=(m.questions.length-1-ri);
        return`<div class="irow">
          <div class="imeta"><span class="badge bbl">질문</span><span class="idate">${q.date}</span></div>
          <div class="itxt">${q.text}</div>
          ${q.reply?`<div class="qrep">💬 ${q.reply}</div>`
          :`<div style="display:flex;gap:6px;margin-top:8px">
              <input type="text" id="rep-${i}" placeholder="답변 입력..." style="flex:1">
              <button class="btn bts btp" onclick="replyQ('${m.id}',${i})">답변</button>
            </div>`}

    <button class="btn btd btf" onclick="delMember('${m.id}')">학생 삭제</button>

function changeCalM(d,mid){
  calM+=d;if(calM>11){calM=0;calY++}if(calM<0){calM=11;calY--}
  const m=members.find(x=>x.id===mid);if(m)renderDetail(m);
}

// ── ATTENDANCE ─────────────────────────────────────────────────
async function toggleAtt(mid,date){
  const m=members.find(x=>x.id===mid);if(!m)return;
  if(!m.attendance)m.attendance=[];
  const i=m.attendance.findIndex(a=>a.date===date);
  if(i===-1)m.attendance.push({date,status:'attended'});
  else if(m.attendance[i].status==='attended')m.attendance[i].status='absent';
  else m.attendance.splice(i,1);
  await sb.from('academy_members').update({attendance:m.attendance}).eq('id',mid);
  renderDetail(m);
}

// ── PROGRESS ───────────────────────────────────────────────────
async function updProg(mid,key,val){
  const m=members.find(x=>x.id===mid);if(!m)return;
  if(!m.progress)m.progress={};m.progress[key]=parseInt(val);
  $('pv-'+key).textContent=val+'%';$('pf-'+key).style.width=val+'%';
  await sb.from('academy_members').update({progress:m.progress}).eq('id',mid);
}
async function saveMemo(mid){
  const m=members.find(x=>x.id===mid);if(!m)return;
  m.notes=$('prog-memo')?.value||'';
  await sb.from('academy_members').update({notes:m.notes}).eq('id',mid);
  toast('메모 저장됐어요');
}

// ── FEEDBACK ───────────────────────────────────────────────────
async function addFb(mid){
  const text=$('fb-text')?.value.trim();if(!text){toast('내용을 입력하세요');return}
  const cats=[...document.querySelectorAll('#fb-chips .chip.on')].map(c=>c.textContent);
  const cat=cats.length?cats.join(', '):'기타';
  const m=members.find(x=>x.id===mid);
  if(!m.feedback)m.feedback=[];
  m.feedback.push({date:new Date().toLocaleDateString('ko-KR'),category:cat,text});
  $('fb-text').value='';
  await sb.from('academy_members').update({feedback:m.feedback}).eq('id',mid);
  renderDetail(m);updateBadges();toast('피드백 저장됐어요');
}

// ── HOMEWORK ───────────────────────────────────────────────────
function setHwMode(mode,mid){
  hwMode=mode;
  document.querySelectorAll('#hw-seg .seg-b').forEach((b,i)=>b.classList.toggle('on',i===(mode==='personal'?0:1)));
  const m=members.find(x=>x.id===mid);if(m)renderHwForm(m);
}
function renderHwForm(m){
  const el=$('hw-form-'+m.id);if(!el)return;
  const approved=members.filter(x=>x.status==='approved');
  if(hwMode==='personal'){
    el.innerHTML=`<div class="fg"><input type="text" id="hw-title" placeholder="숙제 내용"></div>
      <div class="fg"><label class="fl">마감일</label><input type="date" id="hw-due" value="${new Date().toISOString().split('T')[0]}"></div>
      <button class="btn btp btf" onclick="addHwPersonal('${m.id}')">개별 숙제 추가</button>`;
  } else {
    if(hwSel.size===0)approved.forEach(s=>hwSel.add(s.id));
    el.innerHTML=`<div class="fg"><input type="text" id="hw-title" placeholder="공통 숙제 내용"></div>
      <div class="fg"><label class="fl">마감일</label><input type="date" id="hw-due" value="${new Date().toISOString().split('T')[0]}"></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px">
        <span class="fl" style="margin:0">대상 학생</span>
        <span style="color:var(--ac);font-weight:700;cursor:pointer" onclick="toggleAllHw('${m.id}')">${hwSel.size===approved.length?'전체 해제':'전체 선택'} (${hwSel.size}/${approved.length})</span>
      </div>
      ${approved.map(s=>`<div class="schk-row">
        <div class="schk ${hwSel.has(s.id)?'on':''}" id="hws-${s.id}" onclick="toggleHwSel('${s.id}','${m.id}')">
          ${hwSel.has(s.id)?`<svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="#1A6EBF" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:''}
        </div>
        <span style="font-size:14px;font-weight:700">${s.name||s.email}</span>
      </div>`).join('')}
      <button class="btn btp btf" style="margin-top:10px" onclick="addHwCommon('${m.id}')">${hwSel.size}명에게 공통 숙제 추가</button>`;
  }
}
function toggleHwSel(sid,mid){if(hwSel.has(sid))hwSel.delete(sid);else hwSel.add(sid);const m=members.find(x=>x.id===mid);if(m)renderHwForm(m)}
function toggleAllHw(mid){const a=members.filter(x=>x.status==='approved');if(hwSel.size===a.length)hwSel.clear();else a.forEach(s=>hwSel.add(s.id));const m=members.find(x=>x.id===mid);if(m)renderHwForm(m)}

async function addHwPersonal(mid){
  const title=$('hw-title')?.value.trim();if(!title){toast('내용을 입력하세요');return}
  const due=$('hw-due')?.value;
  const m=members.find(x=>x.id===mid);
  if(!m.homework)m.homework=[];
  m.homework.push({title,due,done:false,type:'personal'});
  await sb.from('academy_members').update({homework:m.homework}).eq('id',mid);
  renderDetail(m);updateBadges();toast('숙제 추가됐어요');
}
async function addHwCommon(mid){
  if(!hwSel.size){toast('학생을 선택하세요');return}
  const title=$('hw-title')?.value.trim();if(!title){toast('내용을 입력하세요');return}
  const due=$('hw-due')?.value;
  const cnt=hwSel.size;
  for(const m of members.filter(x=>hwSel.has(x.id))){
    if(!m.homework)m.homework=[];
    m.homework.push({title,due,done:false,type:'common'});
    await sb.from('academy_members').update({homework:m.homework}).eq('id',m.id);
  }
  hwSel.clear();
  const cur=members.find(x=>x.id===mid);if(cur)renderDetail(cur);
  updateBadges();toast(`${cnt}명에게 공통 숙제 추가됐어요`);
}
async function toggleHW(mid,i){
  const m=members.find(x=>x.id===mid);if(!m||!m.homework[i])return;
  m.homework[i].done=!m.homework[i].done;
  if(m.homework[i].done)m.homework[i].doneDate=new Date().toLocaleDateString('ko-KR');
  await sb.from('academy_members').update({homework:m.homework}).eq('id',mid);
  // 목록만 갱신
  const el=$('hw-list-'+mid);
  if(el){
    const hw=m.homework;
    el.innerHTML=[...hw].reverse().map((h,ri)=>{
      const idx=hw.length-1-ri;
      const over=!h.done&&h.due&&new Date(h.due)<new Date();
      return`<div class="hwrow" style="${over?'opacity:.65':''}">
        <div class="hwchk ${h.done?'done':over?'over':''}" onclick="${over?`toast('마감일이 지난 숙제예요')`:`toggleHW('${mid}',${idx})`}">
          ${h.done?`<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#1A8A4A" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:over?'<span style="font-size:9px;color:var(--rd)">✕</span>':''}
        </div>
        <div style="flex:1">
          <div class="hwtitle ${h.done?'hwdone':''}">${h.title}<span class="hwtag ${h.type==='common'?'tagc':'tagp'}">${h.type==='common'?'공통':'개별'}</span></div>
          ${h.due?`<div class="hwdue" style="${over?'color:var(--rd);font-weight:700':''}">${over?'⚠️ 마감 지남 ':'마감 '}${h.due}${h.done?' · 완료':''}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }
  updateBadges();
}

// ── QUESTIONS ──────────────────────────────────────────────────
async function replyQ(mid,i){
  const reply=$('rep-'+i)?.value.trim();if(!reply){toast('답변을 입력하세요');return}
  const m=members.find(x=>x.id===mid);if(!m)return;
  m.questions[i].reply=reply;m.questions[i].replyDate=new Date().toLocaleDateString('ko-KR');
  await sb.from('academy_members').update({questions:m.questions}).eq('id',mid);
  renderDetail(m);updateBadges();toast('답변을 보냈어요!');
}

// ── ADD/EDIT MEMBER ────────────────────────────────────────────
function openAddStudent(){
  $('modal-title').textContent='학생 추가';
  $('modal-body').innerHTML=memberForm(null);
  $('modal').classList.add('on');
}
function openEdit(id){
  const m=members.find(x=>x.id===id);
  $('modal-title').textContent='학생 정보 수정';
  $('modal-body').innerHTML=memberForm(m);
  $('modal').classList.add('on');
}
function memberForm(m){
  return`<div class="fg"><label class="fl">이름 *</label><input type="text" id="f-name" value="${m?.name||''}"></div>
  <div class="row2">
    <div class="fg"><label class="fl">연락처</label><input type="tel" id="f-phone" value="${m?.phone||''}"></div>
    <div class="fg"><label class="fl">이메일</label><input type="email" id="f-email" value="${m?.email||''}"></div>
  </div>
  <div class="row2">
    <div class="fg"><label class="fl">레벨</label><select id="f-level">${['','입문','초급','중급','중상급','고급'].map(l=>`<option value="${l}"${m?.level===l?' selected':''}>${l||'선택'}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">목표</label><input type="text" id="f-goal" value="${m?.goal||''}" placeholder="비즈니스 등"></div>
  </div>
  <div class="row2">
    <div class="fg"><label class="fl">등록일</label><input type="date" id="f-enroll" value="${m?.enroll_date||''}"></div>
    <div class="fg"><label class="fl">재등록 예정</label><input type="date" id="f-reenroll" value="${m?.reenroll_date||''}"></div>
  </div>
  <button class="btn btp btf" onclick="saveMember('${m?.id||''}')">${m?'수정 저장':'학생 추가'}</button>`;
}
async function saveMember(id){
  const name=$('f-name')?.value.trim();if(!name){toast('이름을 입력하세요');return}
  const d={name,phone:$('f-phone')?.value.trim(),email:$('f-email')?.value.trim(),
    level:$('f-level')?.value,goal:$('f-goal')?.value.trim(),
    enroll_date:$('f-enroll')?.value||null,reenroll_date:$('f-reenroll')?.value||null};
  if(id){
    await sb.from('academy_members').update(d).eq('id',id);
    const m=members.find(x=>x.id===id);if(m)Object.assign(m,d);
    closeModal();const cur=members.find(x=>x.id===id);if(cur)renderDetail(cur);
  } else {
    const {data}=await sb.from('academy_members').insert({
      academy_id:academy.id,user_id:user.id,status:'approved',
      ...d,attendance:[],feedback:[],homework:[],progress:{},questions:[],announcements:[]
    }).select().single();
    if(data)members.push(data);
    closeModal();renderClasses();
  }
  toast(id?'수정됐어요':'학생이 추가됐어요');
}
async function delMember(id){
  if(!confirm('정말 삭제할까요?'))return;
  await sb.from('academy_members').delete().eq('id',id);
  members=members.filter(x=>x.id!==id);
  goBack();toast('삭제됐어요');
}

// ── BADGES ─────────────────────────────────────────────────────
function updateBadges(){
  const pending=members.filter(m=>m.status==='pending').length;
  const unanswered=members.filter(m=>m.status==='approved').reduce((s,m)=>s+(m.questions||[]).filter(q=>!q.reply).length,0);
  const total=pending+unanswered;
  const bdg=$('bdg-alerts');
  if(bdg){bdg.textContent=total;bdg.classList.toggle('on',total>0)}
}

// ── ALERTS PAGE ─────────────────────────────────────────────────
function renderAlerts(){
  const el=$('pg-alerts');if(!el)return;
  const pending=members.filter(m=>m.status==='pending');
  const approved=members.filter(m=>m.status==='approved');
  const today=new Date().toLocaleDateString('ko-KR');

  // 알림 목록 빌드
  const items=[];
  pending.forEach(m=>items.push({type:'pending',icon:'👤',text:`${m.name||m.email}님이 가입 신청했어요`,sub:m.email,time:m.created_at,memberId:m.id,isNew:true}));
  approved.forEach(m=>{
    (m.questions||[]).forEach((q,i)=>{
      if(!q.reply)items.push({type:'q',icon:'❓',text:`${m.name||m.email}님이 질문을 남겼어요`,sub:q.text.length>40?q.text.slice(0,40)+'...':q.text,time:q.date,memberId:m.id,isNew:true});
    });
    (m.homework||[]).forEach(h=>{
      if(h.done&&h.doneDate===today)items.push({type:'hw',icon:'✅',text:`${m.name||m.email}님이 숙제를 완료했어요`,sub:h.title,time:today,memberId:m.id,isNew:true});
    });
    (m.homework||[]).forEach(h=>{
      if(!h.done&&h.due&&new Date(h.due)<new Date())
        items.push({type:'late',icon:'⚠️',text:`${m.name||m.email}님 숙제 마감 지남`,sub:`${h.title} (마감: ${h.due})`,time:h.due,memberId:m.id,isNew:false});
    });
  });

  el.innerHTML=pendSection||alertSection?pendSection+alertSection:'<div class="empty">새로운 알림이 없어요 🎉</div>';

function renderHwStat(){
  const el=$('hw-stat');if(!el)return;
  const title=$('hw-sel')?.value;if(!title){el.innerHTML='';return}
  const approved=members.filter(m=>m.status==='approved');
  const done=[],undone=[];
  approved.forEach(m=>{
    const h=(m.homework||[]).find(h=>h.title===title);
    if(h&&h.done)done.push(m);else undone.push(m);
  });
  const rate=approved.length?Math.round(done.length/approved.length*100):0;
  el.innerHTML=`
    <div style="text-align:center;padding:10px 0 6px">
      <span style="font-size:28px;font-weight:700;color:${rate>=80?'var(--gr)':rate>=50?'var(--am)':'var(--rd)'}">${rate}%</span>

    </div>
    <div class="hw-stat-grid">
      <div class="hw-done-box">
        <div style="font-size:13px;font-weight:700;color:var(--gr);margin-bottom:8px">✅ 완료 ${done.length}명</div>
        ${done.map(m=>`<div class="hw-person">
          <div class="hw-av" style="background:#E8F7EE;color:var(--gr);border:1.5px solid #9FE1CB">${(m.name||'?').slice(0,2)}</div>

          <span style="font-size:13px;font-weight:700">${m.name||m.email}</span>

async function sendMsg(){
  const content=$('msg-content')?.value.trim();if(!content){toast('내용을 입력하세요');return}
  const targetVal=$('msg-target')?.value;
  const targetClassId=targetVal==='all'?null:targetVal;
  const {data,error}=await sb.from('messages').insert({academy_id:academy.id,sender_id:user.id,content,target_class_id:targetClassId}).select().single();
  if(error){toast('오류: '+error.message);return}
  const approved=members.filter(m=>m.status==='approved');
  const targets=targetClassId?approved.filter(m=>clsMems.some(cm=>cm.member_id===m.id&&cm.class_id===targetClassId)):approved;
  for(const m of targets){
    if(!m.announcements)m.announcements=[];
    m.announcements.push({id:data.id,content,date:new Date().toLocaleDateString('ko-KR'),read:false});
    await sb.from('academy_members').update({announcements:m.announcements}).eq('id',m.id);
  }
  $('msg-content').value='';msgHistory.unshift(data);
  toast(`${targets.length}명에게 공지를 보냈어요!`);renderNotice();
}

async function saveClassName(id){

  const c=classes.find(x=>x.id===id);if(c)c.name=name;

function openAssignClass(memberId){

async function saveAssign(memberId){
  const sel=classes.filter(c=>$('cc-'+c.id)?.classList.contains('on')).map(c=>c.id);
  await sb.from('class_members').delete().eq('member_id',memberId);
  clsMems=clsMems.filter(x=>x.member_id!==memberId);
  if(sel.length){
    const {data}=await sb.from('class_members').insert(sel.map(class_id=>({class_id,member_id:memberId}))).select();
    if(data)clsMems=[...clsMems,...data];
  }
  closeModal();renderSettings();renderClasses();toast('반 배정 저장됐어요');
}

  const m=myMember;if(!m)return;

  const mn=`${sCalY}-${String(sCalM+1).padStart(2,'0')}`;

function renderSAtt(){
  const m=myMember;if(!m)return;
  const el=$('sp-att');if(!el)return;
  const att=m.attendance||[];
  const MS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const mn=`${sCalY}-${String(sCalM+1).padStart(2,'0')}`;
  const mAtt=att.filter(a=>a.date.startsWith(mn));
  const ts=todayStr();
  const first=new Date(sCalY,sCalM,1).getDay(),days=new Date(sCalY,sCalM+1,0).getDate();
  let cal='';
  for(let i=0;i<first;i++)cal+='<div class="cd emp"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${sCalY}-${String(sCalM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec=att.find(a=>a.date===ds);
    let cls='cd';
    if(rec?.status==='attended')cls+=' att';else if(rec?.status==='absent')cls+=' abs';
    if(ds===ts)cls+=' td';
    cal+=`<div class="${cls}">${d}</div>`;
  }
  const total=att.filter(a=>a.status==='attended').length;
  el.innerHTML=`<div class="card">
    <div class="mnav">
      <button class="btn bts" onclick="changeSCalM(-1)">←</button>
      <span>${sCalY}년 ${MS[sCalM]}</span>
      <button class="btn bts" onclick="changeSCalM(1)">→</button>
    </div>
    <div class="chdr"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
    <div class="cgrid">${cal}</div>
    <div class="att-s" style="margin-top:8px">
      이번달 출석 <b>${mAtt.filter(a=>a.status==='attended').length}회</b> / 결석 <b>${mAtt.filter(a=>a.status==='absent').length}회</b>
      <span style="margin-left:10px;color:var(--tx3)">전체 <b>${total}회</b></span>
    </div>
  </div>`;
}

function changeSCalM(d){
  sCalM+=d;if(sCalM>11){sCalM=0;sCalY++}if(sCalM<0){sCalM=11;sCalY--}
  renderSStats();
  const active=document.querySelector('#app-s .tni.on');
  if(active?.id==='stab-att')renderSAtt();
}

function renderSHw(){
  const m=myMember;if(!m)return;
  const el=$('sp-hw');if(!el)return;
  const hw=m.homework||[];
  const hwRev=[...hw].reverse();
  const shown=hwRev.slice(0,hwN);
  const rest=hwRev.length-hwN;
  const today=new Date();
  el.innerHTML=`<div class="card">
    <div class="sec-hd">
      <div class="card-title" style="margin:0">숙제</div>
      ${hw.length?`<span style="font-size:12px;color:var(--tx2);font-weight:700">완료 ${hw.filter(h=>h.done).length}/${hw.length}</span>`:''}
    </div>
    ${shown.length?shown.map((h,ri)=>{
      const i=hw.length-1-ri;
      const over=!h.done&&h.due&&new Date(h.due)<today;
      return`<div class="hwrow" style="${over?'opacity:.65':''}">
        <div class="hwchk ${h.done?'done':over?'over':''}"
          onclick="${!over?`toggleSHw(${i})`:`toast('마감일이 지난 숙제예요')`}"
          style="${over?'cursor:not-allowed':''}"
        >${h.done?`<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#1A8A4A" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:over?'<span style="font-size:9px;color:var(--rd)">✕</span>':''}
        </div>
        <div style="flex:1">
          <div class="hwtitle ${h.done?'hwdone':''}">${h.title}<span class="hwtag ${h.type==='common'?'tagc':'tagp'}">${h.type==='common'?'공통':'개별'}</span></div>
          ${h.due?`<div class="hwdue" style="${over?'color:var(--rd);font-weight:700':''}">${over?'⚠️ 마감 지남 ':'마감 '}${h.due}${h.done?' · 완료':''}</div>`:''}
        </div>
      </div>`;
    }).join(''):'<div style="font-size:13px;color:var(--tx2);padding:4px 0">숙제가 없어요</div>'}
    ${rest>0?`<button class="more-btn" onclick="hwN+=3;renderSHw()">▾ 더보기 (${rest}개 더)</button>`:''}
    ${hwN>3&&rest<=0?`<button class="more-btn" onclick="hwN=3;renderSHw()">▴ 접기</button>`:''}
  </div>`;
}

async function toggleSHw(i){
  if(!myMember?.homework[i])return;
  const h=myMember.homework[i];
  if(!h.done&&h.due){const due=new Date(h.due);due.setHours(23,59,59);if(due<new Date()){toast('마감일이 지난 숙제예요');return}}
  h.done=!h.done;
  await sb.from('academy_members').update({homework:myMember.homework}).eq('id',myMember.id);
  renderSHw();renderSStats();
}

function renderSTalk(){
  const m=myMember;if(!m)return;
  const el=$('sp-talk');if(!el)return;
  const prog=m.progress||{};
  const fb=[...m.feedback||[]].reverse();
  const qs=[...m.questions||[]].reverse();
  const shownFb=fb.slice(0,fbN);
  const restFb=fb.length-fbN;
  const shownQ=qs.slice(0,qN);
  const restQ=qs.length-qN;

  el.innerHTML=`
    <!-- 진행도 -->
    <div class="card">
      <div class="card-title">진행도</div>
      ${PROG.map(({k,l,c})=>`<div class="pr">
        <div class="pr-row"><span style="font-size:14px;font-weight:700">${l}</span><span style="font-size:14px;font-weight:700;color:${c}">${prog[k]||0}%</span></div>
        <div class="pr-bar"><div class="pr-fill" style="width:${prog[k]||0}%;background:${c}"></div></div>
      </div>`).join('')}
    </div>
    <!-- 피드백 -->
    <div class="card">
      <div class="sec-hd">
        <div class="card-title" style="margin:0">피드백</div>
        ${fb.length?`<span style="font-size:12px;color:var(--tx2);font-weight:700">총 ${fb.length}개</span>`:''}
      </div>
      ${shownFb.length?shownFb.map(f=>`<div class="irow">
        <div class="imeta"><span class="badge ${CAT_CLS[f.category?.split(',')[0]?.trim()]||'bgr2'}">${f.category||'기타'}</span><span class="idate">${f.date}</span></div>
        <div class="itxt">${f.text}</div>
      </div>`).join(''):'<div style="font-size:13px;color:var(--tx2);padding:4px 0">피드백이 없어요</div>'}
      ${restFb>0?`<button class="more-btn" onclick="fbN+=3;renderSTalk()">▾ 더보기 (${restFb}개 더)</button>`:''}
      ${fbN>3&&restFb<=0?`<button class="more-btn" onclick="fbN=3;renderSTalk()">▴ 접기</button>`:''}
    </div>
    <!-- 질문 -->
    <div class="card">
      <div class="sec-hd">
        <div class="card-title" style="margin:0">질문</div>
        ${qs.length?`<span style="font-size:12px;color:var(--tx2);font-weight:700">총 ${qs.length}개</span>`:''}
      </div>
      ${shownQ.length?shownQ.map(q=>`<div class="irow">
        <div class="imeta"><span class="badge bbl">질문</span><span class="idate">${q.date}</span></div>
        <div class="itxt">${q.text}</div>
        ${q.reply?`<div class="qrep">💬 ${q.reply}</div>`:`<div class="qpend">⏳ 답변 대기 중</div>`}
      </div>`).join(''):'<div style="font-size:13px;color:var(--tx2);padding:4px 0">질문이 없어요</div>'}
      ${restQ>0?`<button class="more-btn" onclick="qN+=3;renderSTalk()">▾ 더보기 (${restQ}개 더)</button>`:''}
      ${qN>3&&restQ<=0?`<button class="more-btn" onclick="qN=3;renderSTalk()">▴ 접기</button>`:''}
      <div class="divider"></div>
      <div class="fg"><textarea id="q-text" placeholder="선생님께 질문하세요..."></textarea></div>
      <button class="btn btp btf" onclick="submitQ()">질문 보내기</button>
    </div>`;
}

async function submitQ(){
  const text=$('q-text')?.value.trim();if(!text){toast('질문을 입력하세요');return}
  if(!myMember.questions)myMember.questions=[];
  myMember.questions.push({date:new Date().toLocaleDateString('ko-KR'),text,reply:null});
  $('q-text').value='';
  await sb.from('academy_members').update({questions:myMember.questions}).eq('id',myMember.id);
  renderSTalk();renderSStats();toast('질문을 보냈어요!');
}

// ── MODAL ──────────────────────────────────────────────────────
function closeModal(e){if(!e||e.target===$('modal'))$('modal').classList.remove('on')}

// ── INIT ───────────────────────────────────────────────────────
(async()=>{const{data:{session}}=await sb.auth.getSession();if(session?.user)enterApp(session.user)})();
</script>
